<!doctype html>
<html>
    <head>
        <title>Neon Breach FPS</title>
        <style>
            body {
                margin: 0;
                background: #000;
                overflow: hidden;
                font-family: "Courier New", Courier, monospace;
            }
            #title {
                text-align: center;
                padding: 18px 0 10px;
                letter-spacing: 0.18em;
                user-select: none;
            }
            #title .word-neon   { font-size: 62px; font-weight: 900; color: #0ff;
                                  text-shadow: 0 0 8px #0ff, 0 0 24px #0cf, 0 0 60px #08f;
                                  display: inline-block; animation: flicker 6s infinite; }
            #title .word-breach { font-size: 76px; font-weight: 900; color: #fff;
                                  text-shadow: 0 0 6px #fff, 0 0 22px #f0f, 0 0 55px #c0f;
                                  display: inline-block; transform: skewX(-6deg);
                                  margin: 0 12px; }
            #title .word-fps    { font-size: 44px; font-weight: 700; color: #f80;
                                  text-shadow: 0 0 6px #f80, 0 0 20px #f40;
                                  display: inline-block; vertical-align: middle;
                                  border: 3px solid #f80; padding: 2px 10px 2px 10px;
                                  transform: skewX(-8deg); box-shadow: 0 0 14px #f804; }
            @keyframes flicker {
                0%,100%  { opacity: 1; }
                92%      { opacity: 1; }
                93%      { opacity: 0.3; }
                94%      { opacity: 1; }
                96%      { opacity: 0.5; }
                97%      { opacity: 1; }
            }
            #game-container {
                position: relative;
                width: 1600px;
                height: 800px;
                margin: 4px auto 0;
                border: 4px solid #0ff;
                box-shadow: 0 0 30px #0ff4, 0 0 80px #08f2;
            }
            canvas {
                display: block;
                background: #111;
            }
            #ui {
                position: absolute;
                bottom: 10px;
                left: 10px;
                color: #0ff;
                text-shadow: 0 0 5px #0ff;
            }
            #crosshair {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: #0ff;
                font-weight: bold;
                pointer-events: none;
            }
            #sound-toggle, #pause-btn {
                position: absolute;
                top: 10px;
                background: rgba(0,0,0,0.6);
                border: 1px solid #0cf;
                color: #0cf;
                font-family: "Courier New", Courier, monospace;
                font-size: 14px;
                width: 90px;
                height: 28px;
                box-sizing: border-box;
                cursor: pointer;
                user-select: none;
                letter-spacing: 0.05em;
                z-index: 10;
                text-align: center;
                line-height: 26px;
                padding: 0;
            }
            #sound-toggle { right: 10px; }
            #pause-btn    { right: 108px; display: none; }
            #sound-toggle:hover, #pause-btn:hover { background: rgba(0,200,220,0.15); }
            #sound-toggle.muted { border-color: #555; color: #555; }
            #pause-btn.paused   { border-color: #f80; color: #f80; }
        </style>
    </head>
    <body>
        <div id="title">
            <span class="word-neon">NEON</span>
            <span class="word-breach">BREACH</span>
            <span class="word-fps">FPS</span>
        </div>
        <div id="game-container">
            <canvas id="canvas" width="1600" height="800"></canvas>
            <div id="crosshair">+</div>
            <div id="ui">INTEGRITY: <span id="hp">100%</span> | KILLS: <span id="kills">0</span></div>
            <button id="pause-btn">⏸ PAUSE</button>
            <button id="sound-toggle">♪ SFX ON</button>
        </div>

        <script>
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            const hpDisplay = document.getElementById("hp");

            // map cell values: 0=open, 1=wall
            const map = Array.from({length: 10}, () => new Array(10).fill(1));

            let playerHp = 100;
            let isDead = false;
            let hitFlash = 0;
            let muzzleLife = 0;
            let kills = 0;
            let highScore = parseInt(localStorage.getItem('neonBreachHS') || '0');
            let spawnTimer = 180;
            let medkitRespawnTimer = 1800; // frames until next medkit reappears
            let heartbeatTimer = 60;
            let heartbeatLub = true;
            let gameFrame = 0;
            let gameState = 'menu'; // 'menu' | 'playing' | 'dead'
            let menuFrame = 0;
            let mouseX = 800, mouseY = 400;
            const impacts = [];

            const medkits = [];
            const pickups = [];
            const lights  = []; // neon light sources — rebuilt each map
            const killsDisplay = document.getElementById("kills");
            const spawnPoints = [];

            // ---- Procedural map generation ----
            function applyNewMap() {
                const W = 10, H = 10;
                let component;

                do {
                    // Random interior: ~35% wall density
                    for (let y = 0; y < H; y++)
                        for (let x = 0; x < W; x++)
                            map[y][x] = (x===0||x===W-1||y===0||y===H-1) ? 1 : (Math.random()<0.35 ? 1 : 0);

                    // Guarantee player start area is open
                    map[1][1]=0; map[1][2]=0; map[2][1]=0;

                    // BFS from player spawn to find connected component
                    component = new Set(['1,1']);
                    const queue = [{x:1,y:1}];
                    while (queue.length) {
                        const {x,y} = queue.shift();
                        for (const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                            const nx=x+dx, ny=y+dy, k=`${nx},${ny}`;
                            if (!component.has(k) && nx>=0&&nx<W&&ny>=0&&ny<H && map[ny][nx]===0) {
                                component.add(k); queue.push({x:nx,y:ny});
                            }
                        }
                    }
                    // Seal off disconnected open cells
                    for (let y=0;y<H;y++)
                        for (let x=0;x<W;x++)
                            if (map[y][x]===0 && !component.has(`${x},${y}`)) map[y][x]=1;

                } while (component.size < 24); // retry until map is open enough

                // Pick 3 medkit positions: open cells at least 3 units from player start, spread out
                const candidates = [...component]
                    .map(k => k.split(',').map(Number))
                    .filter(([x,y]) => (x+0.5-1.5)**2+(y+0.5-1.5)**2 > 9)
                    .sort(() => Math.random()-0.5);
                // Greedily pick 3 that are spread at least 3 apart from each other
                const chosen = [];
                for (const [x,y] of candidates) {
                    if (chosen.every(([cx,cy]) => (cx-x)**2+(cy-y)**2 >= 9)) {
                        chosen.push([x,y]);
                        if (chosen.length === 3) break;
                    }
                }
                // Fallback: just take first 3 if spread constraint couldn't be met
                if (chosen.length < 3) chosen.push(...candidates.slice(chosen.length, 3));
                medkits.length = 0;
                chosen.forEach(([x,y]) => medkits.push({x:x+0.5, y:y+0.5, active:true}));

                // Place 2-3 neon light sources in open cells, spread from spawn + each other
                const LIGHT_PALETTE = [
                    [0,210,255], [200,0,255], [255,100,0], [0,255,140], [255,0,120],
                ];
                const lightCands = [...component]
                    .map(k => k.split(',').map(Number))
                    .filter(([x,y]) => (x+0.5-1.5)**2+(y+0.5-1.5)**2 > 4)
                    .sort(() => Math.random()-0.5);
                lights.length = 0;
                const numLights = 2 + (Math.random() < 0.5 ? 1 : 0);
                for (const [x,y] of lightCands) {
                    if (lights.length >= numLights) break;
                    if (lights.every(l => (l.x-(x+0.5))**2+(l.y-(y+0.5))**2 >= 12)) {
                        const [lr,lg,lb] = LIGHT_PALETTE[Math.floor(Math.random()*LIGHT_PALETTE.length)];
                        lights.push({x:x+0.5, y:y+0.5, r:lr, g:lg, b:lb,
                                     radius:3.8, flickerPhase:Math.random()*Math.PI*2});
                    }
                }

                // Rebuild spawn point list
                spawnPoints.length = 0;
                for (let y=0;y<H;y++)
                    for (let x=0;x<W;x++)
                        if (map[y][x]===0) spawnPoints.push({x:x+0.5, y:y+0.5});

                // Place 3–4 item pickups (weapons + defensive items), spread from medkits + each other
                const pickupCands = [...component]
                    .map(k => k.split(',').map(Number))
                    .filter(([x,y]) => (x+0.5-1.5)**2+(y+0.5-1.5)**2 > 4)
                    .sort(() => Math.random()-0.5);
                pickups.length = 0;
                const numPickups = 3 + (Math.random() < 0.5 ? 1 : 0);
                const pTypes = ['machinegun','sniper','armour','shield'];
                const pWeights = [3, 2, 3, 2]; // machinegun/armour more common
                for (const [x,y] of pickupCands) {
                    if (pickups.length >= numPickups) break;
                    let px = x+0.5, py = y+0.5;
                    if (pickups.every(p => (p.x-px)**2+(p.y-py)**2 >= 9) &&
                        medkits.every(m => (m.x-px)**2+(m.y-py)**2 >= 4)) {
                        let r = Math.random()*10, ci = 0, cw = 0;
                        while (ci < 3 && cw + pWeights[ci] <= r) { cw += pWeights[ci]; ci++; }
                        pickups.push({x:px, y:py, type:pTypes[ci], active:true, bobPhase:Math.random()*Math.PI*2});
                    }
                }
            }
            applyNewMap(); // generate the first map on page load

            // tier 0=Grunt  1=Veteran  2=Elite
            const TIER_COLORS = [
                { leg:'#0e1622', legGap:'#080c10', boot:'#141e2c', belt:'#111',
                  arm:'#1a2840', chest:'#121c30', chestHL:'#1e2e4e',
                  trim:'rgba(0,210,200,0.7)', neck:'#8a7060',
                  helm:'#1a1a1a', helmEdge:'#111', visor:'#0a0000', eye:'rgba(255,30,0,0.95)' },
                { leg:'#1a0a08', legGap:'#100604', boot:'#25100a', belt:'#180600',
                  arm:'#33120e', chest:'#280e0c', chestHL:'#3c1616',
                  trim:'rgba(255,110,0,0.85)', neck:'#8a7060',
                  helm:'#1a0a08', helmEdge:'#100404', visor:'#100400', eye:'rgba(255,140,0,0.95)' },
                { leg:'#0e0e0a', legGap:'#080808', boot:'#141410', belt:'#0a0a08',
                  arm:'#161614', chest:'#111110', chestHL:'#1c1c18',
                  trim:'rgba(220,190,0,0.9)', neck:'#806860',
                  helm:'#0c0c0a', helmEdge:'#060606', visor:'#080600', eye:'rgba(220,200,0,0.95)' },
            ];
            const ENEMY_TIERS = [
                { maxHp: 3,  speed: 0.006, coolMin: 90, coolMax: 150, minHit: 0.10, hitFalloff: 0.12 },
                { maxHp: 6,  speed: 0.007, coolMin: 65, coolMax: 110, minHit: 0.30, hitFalloff: 0.07 },
                { maxHp: 10, speed: 0.009, coolMin: 46, coolMax: 85,  minHit: 0.50, hitFalloff: 0.04 },
            ];
            function pickTier() {
                let r = Math.random();
                if (kills < 3)  return 0;
                if (kills < 8)  return r < 0.85 ? 0 : 1;
                if (kills < 15) return r < 0.55 ? 0 : r < 0.90 ? 1 : 2;
                if (kills < 25) return r < 0.25 ? 0 : r < 0.72 ? 1 : 2;
                if (kills < 40) return r < 0.08 ? 0 : r < 0.48 ? 1 : 2;
                return r < 0.55 ? 2 : 1;  // mostly elites at high kills
            }
            function makeEnemy(x, y, tier = 0) {
                const td = ENEMY_TIERS[tier];
                return { x, y, hp: td.maxHp, maxHp: td.maxHp, tier,
                         shootTimer: 180, dead: false, flash: 0,
                         spotted: false, reactionTimer: 0, losGapTimer: 0, muzzleFlashLife: 0,
                         path: [], pathTimer: 0, lastKnownX: x, lastKnownY: y };
            }

            const enemies = [
                makeEnemy(5.5, 5.5),
                makeEnemy(7.5, 2.5),
                makeEnemy(2.5, 7.5),
            ];

            function spawnEnemy() {
                const alive = enemies.filter(e => !e.dead).length;
                if (alive >= 10) return;
                const valid = spawnPoints.filter(p => {
                    let dx = p.x - player.x, dy = p.y - player.y;
                    return Math.sqrt(dx*dx + dy*dy) > 4;
                });
                if (!valid.length) return;
                const p = valid[Math.floor(Math.random() * valid.length)];
                enemies.push(makeEnemy(p.x, p.y, pickTier()));
            }

            // ---- Audio ----
            let paused = false;
            const pauseBtn = document.getElementById('pause-btn');
            function togglePause() {
                if (gameState !== 'playing') return;
                paused = !paused;
                pauseBtn.textContent = paused ? '▶ RESUME' : '⏸ PAUSE';
                pauseBtn.classList.toggle('paused', paused);
                if (paused) document.exitPointerLock();
                else canvas.requestPointerLock();
            }
            pauseBtn.addEventListener('click', togglePause);

            let soundEnabled = localStorage.getItem('neonBreachSFX') !== 'off';
            const soundBtn = document.getElementById('sound-toggle');
            function updateSoundBtn() {
                soundBtn.textContent = soundEnabled ? '♪ SFX ON' : '♪ SFX OFF';
                soundBtn.classList.toggle('muted', !soundEnabled);
            }
            updateSoundBtn();
            soundBtn.addEventListener('click', () => {
                soundEnabled = !soundEnabled;
                localStorage.setItem('neonBreachSFX', soundEnabled ? 'on' : 'off');
                updateSoundBtn();
            });

            let audioCtx = null;
            function getAudio() {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function playGunshot() {
                if (!soundEnabled) return;
                const ac = getAudio();
                const now = ac.currentTime;

                // Crack — short white noise burst
                const crackLen = ac.sampleRate * 0.08;
                const crackBuf = ac.createBuffer(1, crackLen, ac.sampleRate);
                const crackData = crackBuf.getChannelData(0);
                for (let i = 0; i < crackLen; i++) crackData[i] = Math.random() * 2 - 1;
                const crack = ac.createBufferSource();
                crack.buffer = crackBuf;
                const crackFilter = ac.createBiquadFilter();
                crackFilter.type = 'bandpass';
                crackFilter.frequency.value = 1200;
                crackFilter.Q.value = 0.8;
                const crackGain = ac.createGain();
                crackGain.gain.setValueAtTime(1.1, now);
                crackGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                crack.connect(crackFilter);
                crackFilter.connect(crackGain);
                crackGain.connect(ac.destination);
                crack.start(now);

                // Boom — oscillator dropping fast
                const boom = ac.createOscillator();
                boom.type = 'sine';
                boom.frequency.setValueAtTime(180, now);
                boom.frequency.exponentialRampToValueAtTime(35, now + 0.15);
                const boomGain = ac.createGain();
                boomGain.gain.setValueAtTime(0.5, now);
                boomGain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                boom.connect(boomGain);
                boomGain.connect(ac.destination);
                boom.start(now);
                boom.stop(now + 0.2);
            }

            function playEnemyShot() {
                if (!soundEnabled) return;
                const ac = getAudio();
                const now = ac.currentTime;
                // Distant high-passed crack — much quieter than player shot
                const len = ac.sampleRate * 0.055;
                const buf = ac.createBuffer(1, len, ac.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
                const src = ac.createBufferSource();
                src.buffer = buf;
                const filt = ac.createBiquadFilter();
                filt.type = 'highpass';
                filt.frequency.value = 1800;
                const gain = ac.createGain();
                gain.gain.setValueAtTime(0.28, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.055);
                src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
                src.start(now);
                // Small low thump
                const osc = ac.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(110, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                const og = ac.createGain();
                og.gain.setValueAtTime(0.12, now);
                og.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                osc.connect(og); og.connect(ac.destination);
                osc.start(now); osc.stop(now + 0.15);
            }

            function playHeartbeat(volume) {
                if (!soundEnabled) return;
                const ac = getAudio();
                const now = ac.currentTime;
                const osc = ac.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(65, now);
                osc.frequency.exponentialRampToValueAtTime(28, now + 0.14);
                const gain = ac.createGain();
                gain.gain.setValueAtTime(volume, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                osc.connect(gain); gain.connect(ac.destination);
                osc.start(now); osc.stop(now + 0.2);
            }

            function playHeadshot() {
                if (!soundEnabled) return;
                const ac = getAudio();
                const now = ac.currentTime;
                // Sharp high-pitched ping + brief metallic crack
                const ping = ac.createOscillator();
                ping.type = 'sine';
                ping.frequency.setValueAtTime(1800, now);
                ping.frequency.exponentialRampToValueAtTime(900, now + 0.12);
                const pingGain = ac.createGain();
                pingGain.gain.setValueAtTime(0.28, now);
                pingGain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                ping.connect(pingGain); pingGain.connect(ac.destination);
                ping.start(now); ping.stop(now + 0.2);
                // Short noise tick for the "crack"
                const tickLen = ac.sampleRate * 0.025;
                const tickBuf = ac.createBuffer(1, tickLen, ac.sampleRate);
                const td = tickBuf.getChannelData(0);
                for (let i = 0; i < tickLen; i++) td[i] = Math.random() * 2 - 1;
                const tick = ac.createBufferSource();
                tick.buffer = tickBuf;
                const tickFilt = ac.createBiquadFilter();
                tickFilt.type = 'highpass';
                tickFilt.frequency.value = 3000;
                const tickGain = ac.createGain();
                tickGain.gain.setValueAtTime(0.18, now);
                tickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.025);
                tick.connect(tickFilt); tickFilt.connect(tickGain); tickGain.connect(ac.destination);
                tick.start(now);
            }

            function playMedkit() {
                if (!soundEnabled) return;
                const ac = getAudio();
                const now = ac.currentTime;
                [0, 0.1, 0.2].forEach((delay, i) => {
                    const o = ac.createOscillator();
                    o.type = 'sine';
                    o.frequency.value = [440, 554, 659][i];
                    const g = ac.createGain();
                    g.gain.setValueAtTime(0.25, now + delay);
                    g.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.25);
                    o.connect(g); g.connect(ac.destination);
                    o.start(now + delay); o.stop(now + delay + 0.3);
                });
            }
            function playPickup() {
                if (!soundEnabled) return;
                const ac = getAudio(); const now = ac.currentTime;
                [0, 0.07, 0.14].forEach((delay, i) => {
                    const o = ac.createOscillator(), g = ac.createGain();
                    o.type = 'sine'; o.frequency.value = 660 + i * 220;
                    g.gain.setValueAtTime(0.18, now + delay);
                    g.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.15);
                    o.connect(g); g.connect(ac.destination);
                    o.start(now + delay); o.stop(now + delay + 0.15);
                });
            }
            // ---- End Audio ----

            // BFS pathfinding on the 10x10 grid — returns array of {x,y} cell-centre waypoints
            function findPath(fromX, fromY, toX, toY) {
                const sx = Math.floor(fromX), sy = Math.floor(fromY);
                const ex = Math.floor(toX),   ey = Math.floor(toY);
                if (sx === ex && sy === ey) return [];
                const queue = [[sx, sy]];
                const prev  = {};
                const visited = new Set([`${sx},${sy}`]);
                const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
                while (queue.length) {
                    const [cx, cy] = queue.shift();
                    if (cx === ex && cy === ey) {
                        const path = [];
                        let k = `${cx},${cy}`;
                        while (prev[k]) {
                            const [px, py] = k.split(',').map(Number);
                            path.unshift({ x: px + 0.5, y: py + 0.5 });
                            k = prev[k];
                        }
                        return path;
                    }
                    for (const [dx, dy] of dirs) {
                        const nx = cx + dx, ny = cy + dy;
                        const k = `${nx},${ny}`;
                        if (nx >= 0 && nx < 10 && ny >= 0 && ny < 10 &&
                            map[ny][nx] === 0 && !visited.has(k)) {
                            visited.add(k);
                            prev[k] = `${cx},${cy}`;
                            queue.push([nx, ny]);
                        }
                    }
                }
                return [];
            }

            function hasLOS(ax, ay, bx, by) {
                let dx = bx - ax, dy = by - ay;
                let steps = Math.ceil(Math.sqrt(dx*dx + dy*dy) / 0.08);
                for (let i = 1; i < steps; i++) {
                    let t = i / steps;
                    let cx = Math.floor(ax + dx * t), cy = Math.floor(ay + dy * t);
                    if (cx < 0 || cx >= 10 || cy < 0 || cy >= 10 || map[cy][cx] === 1) return false;
                }
                return true;
            }

            const player = {
                x: 1.5, y: 1.5,
                dir: 0,
                pitch: 0,
                isShooting: false,
                isAiming: false,
                aimFov: Math.PI / 3,   // smoothly interpolated FOV
                shotTargetX: 800, shotTargetY: 400,
                z: 0, velZ: 0, onGround: true,
                vx: 0, vy: 0,
                weapon: 'pistol',    // 'pistol' | 'machinegun' | 'sniper'
                ammo: 0,
                armourShots: 0,      // damage-reduction shots remaining
                shieldShots: 0,      // full-block shots remaining
                autoFire: false,
                autoFireTimer: 0,
            };
            const keys = {};

            function respawn() {
                applyNewMap();
                player.x = 1.5; player.y = 1.5; player.dir = 0; player.pitch = 0;
                player.z = 0; player.velZ = 0; player.onGround = true; player.vx = 0; player.vy = 0;
                player.weapon = 'pistol'; player.ammo = 0; player.armourShots = 0; player.shieldShots = 0; player.autoFire = false; player.autoFireTimer = 0;
                playerHp = 100; hpDisplay.textContent = '100%';
                isDead = false; hitFlash = 0; heartbeatTimer = 60; heartbeatLub = true;
                kills = 0; killsDisplay.textContent = 0;
                enemies.length = 0;
                impacts.length = 0;
                medkitRespawnTimer = 1800;
                spawnTimer = 60;
                paused = false;
                pauseBtn.textContent = '⏸ PAUSE';
                pauseBtn.classList.remove('paused');
                pauseBtn.style.display = 'block';
                gameState = 'playing';
                canvas.requestPointerLock();
            }

            function goToMenu() {
                isDead = false;
                paused = false;
                pauseBtn.style.display = 'none';
                gameState = 'menu';
                document.exitPointerLock();
            }

            window.addEventListener("keydown", (e) => {
                keys[e.code] = true;
                if (e.code === 'KeyR' && gameState === 'dead') respawn();
                if (e.code === 'Enter' && gameState === 'menu') respawn();
                if (e.code === 'KeyM') soundBtn.click();
                if (e.code === 'KeyP' || e.code === 'Escape') togglePause();
            });
            window.addEventListener("keyup", (e) => (keys[e.code] = false));

            canvas.addEventListener("click", (e) => {
                if (gameState === 'menu') { respawn(); return; }
                if (gameState === 'dead') {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = 1600 / rect.width, scaleY = 800 / rect.height;
                    const cx = (e.clientX - rect.left) * scaleX;
                    const cy = (e.clientY - rect.top) * scaleY;
                    if (cx > 490 && cx < 750 && cy > 535 && cy < 600) { respawn(); return; }
                    if (cx > 850 && cx < 1110 && cy > 535 && cy < 600) { goToMenu(); return; }
                    return;
                }
                if (document.pointerLockElement !== canvas) {
                    canvas.requestPointerLock();
                }
            });
            function doShoot() {
                const weapon = player.weapon;
                let wallDist = 0, ex = Math.cos(player.dir), ey = Math.sin(player.dir);
                while (wallDist < 15) {
                    wallDist += 0.05;
                    let tx = Math.floor(player.x + ex * wallDist), ty = Math.floor(player.y + ey * wallDist);
                    if (tx < 0 || tx >= 10 || ty < 0 || ty >= 10 || map[ty][tx] === 1) break;
                }
                // Per-weapon spread
                let hipMult = 28, hipMax = 440, aimMult = 0.5, aimMax = 8;
                if (weapon === 'machinegun') { hipMult = 50; hipMax = 700; aimMult = 0.9; aimMax = 20; }
                if (weapon === 'sniper')     { hipMult = 12; hipMax = 180; aimMult = 0.08; aimMax = 1; }
                let spread = player.isAiming
                    ? Math.min(aimMax, wallDist * aimMult)
                    : Math.min(hipMax, wallDist * hipMult);
                player.shotTargetX = 800 + (Math.random() - 0.5) * spread;
                player.shotTargetY = 400 + (Math.random() - 0.5) * spread;

                muzzleLife = weapon === 'machinegun' ? 0.5 : 1.0;
                playGunshot();

                // Per-weapon damage
                let bodyDmg = weapon === 'machinegun' ? 0.5 : weapon === 'sniper' ? 2 : 1;
                let headDmg = weapon === 'machinegun' ? 1   : weapon === 'sniper' ? 99: 3;

                // Hit detection (same screen-space logic as before)
                let hitEnemy = false, nearest = null, nearestDist = Infinity, nearestHS = false;
                const fovAtShot = player.aimFov;
                const zoomAtShot = Math.tan(Math.PI / 6) / Math.tan(fovAtShot / 2);
                const vertOffsetAtShot = player.pitch * zoomAtShot + player.z * 2;
                enemies.forEach(e => {
                    if (e.dead) return;
                    let dx = e.x - player.x, dy = e.y - player.y;
                    let d = Math.sqrt(dx*dx + dy*dy);
                    let eAngle = Math.atan2(dy, dx) - player.dir;
                    while (eAngle >  Math.PI) eAngle -= 2 * Math.PI;
                    while (eAngle < -Math.PI) eAngle += 2 * Math.PI;
                    if (Math.abs(eAngle) > fovAtShot / 2 + 0.3) return;
                    let eScrX = (0.5 + eAngle / fovAtShot) * 1600;
                    let eSprH = 640 / d * zoomAtShot;
                    let eSprTop = 400 - eSprH / 2 + vertOffsetAtShot;
                    let halfW = eSprH * 0.55 / 2 + 8;
                    if (Math.abs(player.shotTargetX - eScrX) < halfW && d < nearestDist && hasLOS(player.x, player.y, e.x, e.y)) {
                        nearest = e; nearestDist = d;
                        nearestHS = player.shotTargetY >= eSprTop + eSprH * 0.06 &&
                                    player.shotTargetY <= eSprTop + eSprH * 0.30;
                    }
                });
                if (nearest) {
                    let dmg = nearestHS ? headDmg : bodyDmg;
                    nearest.hp -= dmg;
                    nearest.flash = 8;
                    hitEnemy = true;
                    if (nearestHS) playHeadshot();
                    if (nearest.hp <= 0) { nearest.dead = true; kills++; killsDisplay.textContent = kills; }
                }
                impacts.push({
                    x: player.shotTargetX, y: player.shotTargetY,
                    life: 1.0, isBlood: hitEnemy, isHeadshot: nearestHS,
                    sparks: Array.from({ length: 8 }, () => ({
                        angle: Math.random() * Math.PI * 2,
                        speed: 1.5 + Math.random() * 3,
                        len: 4 + Math.random() * 8,
                    })),
                });
                // Consume ammo for special weapons; revert to pistol when empty
                if (weapon !== 'pistol') {
                    player.ammo--;
                    if (player.ammo <= 0) { player.weapon = 'pistol'; player.ammo = 0; }
                }
            }

            document.addEventListener("mousedown", (e) => {
                if (document.pointerLockElement !== canvas) return;
                if (isDead || paused) return;
                if (e.button === 2) { player.isAiming = true; e.preventDefault(); }
                if (e.button === 0) {
                    if (player.weapon === 'machinegun') {
                        player.autoFire = true;
                        if (player.autoFireTimer <= 0) { doShoot(); player.autoFireTimer = 5; }
                    } else if (!player.isShooting) {
                        player.isShooting = true;
                        doShoot();
                        setTimeout(() => (player.isShooting = false), 200);
                    }
                }
            });
            document.addEventListener("mouseup", (e) => {
                if (e.button === 2) player.isAiming = false;
                if (e.button === 0) player.autoFire = false;
            });
            canvas.addEventListener("contextmenu", (e) => e.preventDefault());
            document.addEventListener("mousemove", (e) => {
                if (document.pointerLockElement === canvas && !isDead) {
                    player.dir += e.movementX * 0.002;
                    player.pitch = Math.max(-300, Math.min(300, player.pitch - e.movementY * 0.5));
                } else {
                    const rect = canvas.getBoundingClientRect();
                    mouseX = (e.clientX - rect.left) * (1600 / rect.width);
                    mouseY = (e.clientY - rect.top) * (800 / rect.height);
                }
            });

            function update() {
                if (gameState === 'menu') { menuFrame++; return; }
                if (paused || isDead) return;

                // Smoothly zoom FOV in/out
                let scopedFov = player.weapon === 'sniper' ? Math.PI / 32 : Math.PI / 8;
                let targetFov = player.isAiming ? scopedFov : Math.PI / 3;
                player.aimFov += (targetFov - player.aimFov) * 0.12;

                // Machine gun auto-fire
                if (player.autoFire && player.weapon === 'machinegun') {
                    player.autoFireTimer--;
                    if (player.autoFireTimer <= 0) { doShoot(); player.autoFireTimer = 5; }
                } else {
                    player.autoFireTimer = 0;
                }

                const speed = keys["ShiftLeft"] || keys["ShiftRight"] ? 0.015 : 0.004;

                let tx = 0, ty = 0;
                if (keys["KeyW"]) { tx += Math.cos(player.dir) * speed; ty += Math.sin(player.dir) * speed; }
                if (keys["KeyS"]) { tx -= Math.cos(player.dir) * speed; ty -= Math.sin(player.dir) * speed; }
                if (keys["KeyA"]) { tx += Math.cos(player.dir - Math.PI/2) * speed; ty += Math.sin(player.dir - Math.PI/2) * speed; }
                if (keys["KeyD"]) { tx += Math.cos(player.dir + Math.PI/2) * speed; ty += Math.sin(player.dir + Math.PI/2) * speed; }

                // Smooth velocity
                player.vx = player.vx * 0.75 + tx * 0.25;
                player.vy = player.vy * 0.75 + ty * 0.25;

                let newX = player.x + player.vx;
                let newY = player.y + player.vy;

                if (map[Math.floor(newY)][Math.floor(player.x)] === 0) player.y = newY;
                if (map[Math.floor(player.y)][Math.floor(newX)] === 0) player.x = newX;

                if (keys["Space"] && player.onGround) { player.velZ = 3.5; player.onGround = false; }
                player.velZ -= 0.2;
                player.z += player.velZ;
                if (player.z <= 0) { player.z = 0; player.velZ = 0; player.onGround = true; }

                // Spawn enemies on a timer (faster as kills increase)
                spawnTimer--;
                if (spawnTimer <= 0) {
                    spawnEnemy();
                    spawnTimer = Math.max(90, 300 - kills * 10);
                }

                // Medkit respawn — one at a time, gets rarer as kills climb
                medkitRespawnTimer--;
                if (medkitRespawnTimer <= 0) {
                    const inactive = medkits.filter(m => !m.active);
                    if (inactive.length > 0) {
                        inactive[Math.floor(Math.random() * inactive.length)].active = true;
                    }
                    // 30s base, up to ~2min at high kills
                    medkitRespawnTimer = Math.min(7200, 1800 + kills * 90);
                }

                // Decay animations
                if (muzzleLife > 0) muzzleLife = Math.max(0, muzzleLife - 0.15);
                for (let i = impacts.length - 1; i >= 0; i--) {
                    impacts[i].life -= 0.07;
                    if (impacts[i].life <= 0) impacts.splice(i, 1);
                }

                // Enemy AI
                if (hitFlash > 0) hitFlash--;
                enemies.forEach(enemy => {
                    if (enemy.dead) return;
                    if (enemy.flash > 0) enemy.flash--;
                    if (enemy.muzzleFlashLife > 0) enemy.muzzleFlashLife = Math.max(0, enemy.muzzleFlashLife - 0.15);
                    let dx = player.x - enemy.x, dy = player.y - enemy.y;
                    let d = Math.sqrt(dx*dx + dy*dy);
                    const canSee = hasLOS(enemy.x, enemy.y, player.x, player.y);

                    if (canSee) {
                        enemy.losGapTimer = 0;
                        if (!enemy.spotted) {
                            // First time spotting — set reaction delay (3–5 seconds at 60fps)
                            enemy.spotted = true;
                            // Reaction time shrinks as kills climb: 3–5s early, ~0.5s at kill 40+
                            let reactionBase = Math.max(30, 180 - kills * 3.5);
                            let reactionRange = Math.max(15, 120 - kills * 2);
                            enemy.reactionTimer = (reactionBase + Math.random() * reactionRange) | 0;
                            enemy.shootTimer = enemy.reactionTimer + 90; // don't fire during reaction
                        }
                        // Count down reaction time before enemy is ready to shoot
                        if (enemy.reactionTimer > 0) enemy.reactionTimer--;

                        // Has LOS: record last known position, move directly (path is clear)
                        const COMBAT_RANGE = 3.5;
                        const td = ENEMY_TIERS[enemy.tier];
                        enemy.lastKnownX = player.x;
                        enemy.lastKnownY = player.y;
                        enemy.path = [];
                        if (d > COMBAT_RANGE) {
                            let nx = enemy.x + (dx/d) * td.speed, ny = enemy.y + (dy/d) * td.speed;
                            if (map[Math.floor(ny)][Math.floor(enemy.x)] === 0) enemy.y = ny;
                            if (map[Math.floor(enemy.y)][Math.floor(nx)] === 0) enemy.x = nx;
                        }

                        // Only shoot after reaction time has elapsed
                        if (enemy.reactionTimer <= 0) {
                            enemy.shootTimer--;
                            if (enemy.shootTimer <= 0) {
                                enemy.muzzleFlashLife = 1.0;
                                playEnemyShot();
                                let hitChance = Math.max(td.minHit, 1.0 - d * td.hitFalloff);
                                if (Math.random() < hitChance) {
                                    let dmg = Math.max(1, 12 - d * 1.2) | 0;
                                    if (player.shieldShots > 0) { player.shieldShots--; dmg = 0; hitFlash = 6; }
                                    else if (player.armourShots > 0) { player.armourShots--; dmg = Math.max(1, Math.floor(dmg * 0.3)); }
                                    if (dmg > 0) { playerHp = Math.max(0, playerHp - dmg); hpDisplay.textContent = playerHp + '%'; hitFlash = 12; }
                                }
                                enemy.shootTimer = td.coolMin + (Math.random() * (td.coolMax - td.coolMin)) | 0;
                            }
                        }
                    } else {
                        // Lost line of sight — navigate to last known position via BFS
                        enemy.losGapTimer++;
                        if (enemy.spotted) {
                            const td2 = ENEMY_TIERS[enemy.tier];
                            // Recalculate path periodically or when exhausted
                            if (enemy.pathTimer <= 0 || enemy.path.length === 0) {
                                enemy.path = findPath(enemy.x, enemy.y, enemy.lastKnownX, enemy.lastKnownY);
                                enemy.pathTimer = 40;
                            }
                            enemy.pathTimer--;
                            if (enemy.path.length > 0) {
                                const wp = enemy.path[0];
                                const wdx = wp.x - enemy.x, wdy = wp.y - enemy.y;
                                const wd = Math.sqrt(wdx*wdx + wdy*wdy);
                                if (wd < 0.18) {
                                    enemy.path.shift(); // reached waypoint, advance
                                } else {
                                    let nx = enemy.x + (wdx/wd) * td2.speed;
                                    let ny = enemy.y + (wdy/wd) * td2.speed;
                                    if (map[Math.floor(ny)][Math.floor(enemy.x)] === 0) enemy.y = ny;
                                    if (map[Math.floor(enemy.y)][Math.floor(nx)] === 0) enemy.x = nx;
                                }
                            }
                        }
                        // Give up after ~5 seconds out of sight
                        if (enemy.losGapTimer > 300) {
                            enemy.spotted = false;
                            enemy.reactionTimer = 0;
                            enemy.losGapTimer = 0;
                            enemy.path = [];
                        }
                    }
                });

                gameFrame++;

                // Heartbeat — speeds up as HP drops
                if (!isDead) {
                    heartbeatTimer--;
                    if (heartbeatTimer <= 0) {
                        if (heartbeatLub) {
                            playHeartbeat(0.7);
                            heartbeatTimer = 10; // gap between lub and dub
                        } else {
                            playHeartbeat(0.4);
                            // Interval: fast at low HP, slow at full HP
                            heartbeatTimer = Math.floor(30 + playerHp * 1.3);
                        }
                        heartbeatLub = !heartbeatLub;
                    }
                }

                // Medkit pickup
                medkits.forEach(m => {
                    if (!m.active) return;
                    if (Math.hypot(player.x - m.x, player.y - m.y) < 0.6) {
                        m.active = false;
                        playerHp = 100;
                        hpDisplay.textContent = '100%';
                        playMedkit();
                    }
                });

                // Item pickup collision
                pickups.forEach(p => {
                    if (!p.active) return;
                    if (Math.hypot(player.x - p.x, player.y - p.y) < 0.6) {
                        p.active = false;
                        if (p.type === 'machinegun') {
                            player.ammo = player.weapon === 'machinegun' ? Math.min(160, player.ammo + 80) : 80;
                            player.weapon = 'machinegun';
                        } else if (p.type === 'sniper') {
                            player.ammo = player.weapon === 'sniper' ? Math.min(24, player.ammo + 12) : 12;
                            player.weapon = 'sniper';
                        } else if (p.type === 'armour') {
                            player.armourShots = Math.min(50, player.armourShots + 25);
                        } else if (p.type === 'shield') {
                            player.shieldShots = Math.min(16, player.shieldShots + 8);
                        }
                        playPickup();
                    }
                });

                // Death
                if (playerHp <= 0 && !isDead) {
                    isDead = true;
                    paused = false;
                    pauseBtn.style.display = 'none';
                    gameState = 'dead';
                    document.exitPointerLock();
                    if (kills > highScore) {
                        highScore = kills;
                        localStorage.setItem('neonBreachHS', highScore);
                    }
                }
            }

            function drawEnemyPreview(cx, cy, h, tier) {
                const TC = TIER_COLORS[tier];
                const w = h * 0.55;
                const sx = Math.floor(cx - w/2), sy = Math.floor(cy - h/2);
                const fw = Math.ceil(w);
                ctx.fillStyle = TC.legGap;
                ctx.fillRect(sx, sy, fw, Math.ceil(h));
                const lg = Math.ceil(w * 0.42);
                ctx.fillStyle = TC.leg;
                ctx.fillRect(sx, sy + (h*0.63)|0, lg, (h*0.37)|0);
                ctx.fillRect(sx + fw - lg, sy + (h*0.63)|0, lg, (h*0.37)|0);
                ctx.fillStyle = TC.boot;
                ctx.fillRect(sx, sy + (h*0.88)|0, lg, Math.max(2, (h*0.12)|0));
                ctx.fillRect(sx + fw - lg, sy + (h*0.88)|0, lg, Math.max(2, (h*0.12)|0));
                ctx.fillStyle = TC.belt;
                ctx.fillRect(sx, sy + (h*0.59)|0, fw, Math.max(2, (h*0.05)|0));
                const armW = Math.max(2, (w * 0.15)|0);
                ctx.fillStyle = TC.arm;
                ctx.fillRect(sx, sy + (h*0.30)|0, armW, (h*0.30)|0);
                ctx.fillRect(sx + fw - armW, sy + (h*0.30)|0, armW, (h*0.30)|0);
                const cxs = sx + armW, cw = fw - armW * 2;
                ctx.fillStyle = TC.chest;
                ctx.fillRect(cxs, sy + (h*0.30)|0, cw, (h*0.29)|0);
                ctx.fillStyle = TC.chestHL;
                ctx.fillRect(cxs + (cw*0.43)|0, sy + (h*0.31)|0, Math.max(2,(cw*0.14)|0), (h*0.27)|0);
                ctx.fillStyle = TC.trim;
                ctx.fillRect(cxs, sy + (h*0.585)|0, cw, Math.max(1, (h*0.015)|0));
                ctx.fillStyle = TC.neck;
                ctx.fillRect(sx + (fw*0.38)|0, sy + (h*0.24)|0, (fw*0.24)|0, (h*0.07)|0);
                ctx.fillStyle = TC.helmEdge;
                ctx.fillRect(sx, sy + (h*0.06)|0, fw, (h*0.18)|0);
                ctx.fillStyle = TC.helm;
                ctx.fillRect(sx + (fw*0.22)|0, sy + (h*0.06)|0, (fw*0.56)|0, (h*0.18)|0);
                ctx.fillStyle = TC.visor;
                ctx.fillRect(sx + (fw*0.22)|0, sy + (h*0.14)|0, (fw*0.56)|0, (h*0.07)|0);

                ctx.fillRect(sx + (fw*0.28)|0, sy + (h*0.155)|0, Math.max(2,(fw*0.12)|0), Math.max(2,(h*0.04)|0));
                ctx.fillRect(sx + (fw*0.60)|0, sy + (h*0.155)|0, Math.max(2,(fw*0.12)|0), Math.max(2,(h*0.04)|0));
            }

                ctx.beginPath(); ctx.moveTo(lx+8, panY+32); ctx.lineTo(lx+lw-8, panY+32); ctx.stroke();
                const ctrls = [
                    ['W / A / S / D', 'Move'],
                    ['MOUSE', 'Look around'],

                ctx.font = '15px "Courier New"';
                ctrls.forEach(([key, action], i) => {

                });

                // ---- Left panel: Field Items ----
                const mkY = panY + ctrlH + 12, mkH = panH - ctrlH - 12;

                ctx.beginPath(); ctx.moveTo(lx+8, mkY+27); ctx.lineTo(lx+lw-8, mkY+27); ctx.stroke();

                const ITEMS = [
                    { label:'MEDKIT',       col:'#4f8', desc:'Fully restores HP  ·  3 per map, respawns' },

                    { label:'SNIPER RIFLE', col:'#fc0', desc:'12 rds  ·  extreme zoom  ·  hs = instakill' },
                    { label:'ARMOUR',       col:'#68f', desc:'25 shots  ·  incoming damage cut to 30%'    },
                    { label:'FORCE FIELD',  col:'#c4f', desc:'8 shots  ·  full damage immunity'           },
