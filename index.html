<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
        <title>Neon Breach FPS</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { background: #000; overflow: hidden; font-family: "Courier New", Courier, monospace; }
            canvas {
                display: block;
                position: fixed;
                top: 0; left: 0;
                width: 100vw;
                height: 100vh;
                background: #111;
            }
            #crosshair {
                position: fixed;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                color: #0ff;
                font-weight: bold;
                pointer-events: none;
                z-index: 5;
            }
            #sound-toggle, #pause-btn {
                position: fixed;
                top: 10px;
                background: rgba(0,0,0,0.6);
                border: 1px solid #0cf;
                color: #0cf;
                font-family: "Courier New", Courier, monospace;
                font-size: 14px;
                width: 90px;
                height: 28px;
                cursor: pointer;
                user-select: none;
                letter-spacing: 0.05em;
                z-index: 10;
                text-align: center;
                line-height: 26px;
                padding: 0;
            }
            #sound-toggle { right: 10px; }
            #pause-btn    { right: 108px; display: none; }
            #sound-toggle:hover, #pause-btn:hover { background: rgba(0,200,220,0.15); }
            #sound-toggle.muted { border-color: #555; color: #555; }
            #pause-btn.paused   { border-color: #f80; color: #f80; }

            /* ── Mobile touch controls ── */
            #mobile-controls { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 20; }
            .joy-base {
                position: absolute;
                width: 120px; height: 120px;
                border-radius: 50%;
                background: rgba(0,255,255,0.08);
                border: 2px solid rgba(0,255,255,0.3);
                pointer-events: auto;
                touch-action: none;
                -webkit-tap-highlight-color: transparent;
            }
            .joy-knob {
                position: absolute;
                width: 50px; height: 50px;
                border-radius: 50%;
                background: rgba(0,200,220,0.45);
                border: 2px solid #0ff;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                pointer-events: none;
            }
            #joy-left  { bottom: 30px; left: 30px; }
            #joy-right { bottom: 30px; right: 30px; }
            .mob-btn {
                position: absolute;
                border-radius: 50%;
                background: rgba(255,80,0,0.2);
                border: 2px solid #f80;
                color: #f80;
                font-size: 15px;
                font-weight: bold;
                font-family: "Courier New", monospace;
                display: flex; align-items: center; justify-content: center;
                pointer-events: auto;
                touch-action: none;
                -webkit-tap-highlight-color: transparent;
                user-select: none;
            }
            #fire-btn { width: 80px; height: 80px; bottom: 160px; right: 40px; font-size: 14px; }
            #aim-btn  { width: 60px; height: 60px; bottom: 160px; right: 140px;
                        background: rgba(0,200,255,0.15); border-color: #0cf; color: #0cf; font-size: 13px; }
        </style>
    </head>
    <body>
        <canvas id="canvas" width="1600" height="800"></canvas>
        <div id="crosshair">+</div>
        <button id="pause-btn">⏸ PAUSE</button>
        <button id="sound-toggle">♪ SFX ON</button>
        <div id="mobile-controls">
            <div class="joy-base" id="joy-left"><div class="joy-knob" id="joy-left-knob"></div></div>
            <div class="joy-base" id="joy-right"><div class="joy-knob" id="joy-right-knob"></div></div>
            <div class="mob-btn" id="fire-btn">FIRE</div>
            <div class="mob-btn" id="aim-btn">AIM</div>
        </div>

        <script>
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            const SCREEN_W = canvas.width;
            const SCREEN_H = canvas.height;
            const HALF_W = SCREEN_W / 2;
            const HALF_H = SCREEN_H / 2;
            const MAP_W = 16;
            const MAP_H = 16;
            const MAP_SIZE = MAP_W * MAP_H;
            const NUM_RAYS = 800;
            const SLICE_W = SCREEN_W / NUM_RAYS;
            const TEX_SIZE = 128;
            const LITTLE_ENDIAN = new Uint8Array(new Uint32Array([0x11223344]).buffer)[0] === 0x44;
            const sceneImage = ctx.createImageData(SCREEN_W, SCREEN_H);
            const scenePixels = new Uint32Array(sceneImage.data.buffer);
            const zBuffer = new Float32Array(NUM_RAYS);
            const pathQueueX = new Int16Array(MAP_SIZE);
            const pathQueueY = new Int16Array(MAP_SIZE);
            const pathPrev = new Int16Array(MAP_SIZE);
            const pathVisited = new Uint8Array(MAP_SIZE);

            // map cell values: 0=open, 1=wall
            const map = Array.from({length: MAP_H}, () => new Array(MAP_W).fill(1));

            let playerHp = 100;
            const playerRadius = 0.28;
            let isDead = false;
            let hitFlash = 0;
            let muzzleLife = 0;
            let kills = 0;
            let highScore = parseInt(localStorage.getItem('neonBreachHS') || '0');
            let spawnTimer = 180;
            let medkitRespawnTimer = 1800; // frames until next medkit reappears
            let heartbeatTimer = 60;
            let heartbeatLub = true;
            let gameFrame = 0;
            let gameState = 'menu'; // 'menu' | 'playing' | 'dead'
            let menuFrame = 0;
            let mouseX = 800, mouseY = 400;
            let isMobile = false;
            const mob = { moveX: 0, moveY: 0, lookX: 0, lookY: 0, firing: false, aiming: false };
            const impacts = [];

            const medkits = [];
            const pickups = [];
            const lights  = []; // neon light sources — rebuilt each map
            const spawnPoints = [];

            // ---- Procedural Texture Generation ----
            const wallCanvas = document.createElement('canvas');
            wallCanvas.width = 128; wallCanvas.height = 128;
            const wctx = wallCanvas.getContext('2d');

            const floorCanvas = document.createElement('canvas');
            floorCanvas.width = 128; floorCanvas.height = 128;
            const fctx = floorCanvas.getContext('2d');

            const ceilCanvas = document.createElement('canvas');
            ceilCanvas.width = 128; ceilCanvas.height = 128;
            const cctx = ceilCanvas.getContext('2d');

            function packColor(r, g, b, a = 255) {
                if (LITTLE_ENDIAN) return (((a & 255) << 24) | ((b & 255) << 16) | ((g & 255) << 8) | (r & 255)) >>> 0;
                return (((r & 255) << 24) | ((g & 255) << 16) | ((b & 255) << 8) | (a & 255)) >>> 0;
            }

            function buildPackedTexture(texCtx) {
                const texData = texCtx.getImageData(0, 0, TEX_SIZE, TEX_SIZE);
                return new Uint32Array(texData.data.buffer);
            }

            function shadePackedColor(packed, brightness) {
                const r = packed & 255;
                const g = (packed >>> 8) & 255;
                const b = (packed >>> 16) & 255;
                return packColor((r * brightness) | 0, (g * brightness) | 0, (b * brightness) | 0);
            }

            function generateTextures() {
                // Wall Texture: Cyber-panel
                wctx.fillStyle = '#111';
                wctx.fillRect(0,0,128,128);
                wctx.strokeStyle = '#222';
                wctx.lineWidth = 2;
                for(let i=0; i<128; i+=32) {
                    wctx.strokeRect(i, 0, 32, 128);
                    wctx.strokeRect(0, i, 128, 32);
                }
                wctx.strokeStyle = '#0ff2';
                wctx.lineWidth = 1;
                for(let i=0; i<128; i+=8) {
                    wctx.beginPath(); wctx.moveTo(i,0); wctx.lineTo(i,128); wctx.stroke();
                    wctx.beginPath(); wctx.moveTo(0,i); wctx.lineTo(128,i); wctx.stroke();
                }
                // Neon accents
                wctx.strokeStyle = '#0ff6';
                wctx.lineWidth = 2;
                wctx.strokeRect(4,4,120,120);
                wctx.strokeRect(36,36,56,56);
                wctx.fillStyle = '#0ff';
                [4,120].forEach(x => [4,120].forEach(y => wctx.fillRect(x-2,y-2,4,4)));

                // Floor Texture: Gritty metal plate
                fctx.fillStyle = '#0a0a0c';
                fctx.fillRect(0,0,128,128);
                fctx.strokeStyle = '#15151a';
                fctx.lineWidth = 1;
                for(let i=0; i<128; i+=16) {
                    fctx.strokeRect(i, 0, 16, 128);
                    fctx.strokeRect(0, i, 128, 16);
                }
                // Bolts / rivets
                fctx.fillStyle = '#1a1a22';
                for(let y=8; y<128; y+=16) for(let x=8; x<128; x+=16) fctx.fillRect(x-1,y-1,2,2);

                // Ceiling Texture: Circuit grid
                cctx.fillStyle = '#020205';
                cctx.fillRect(0,0,128,128);
                cctx.strokeStyle = '#003344';
                cctx.lineWidth = 1;
                for(let i=0; i<128; i+=64) cctx.strokeRect(i, i, 64, 64);
                cctx.strokeStyle = '#001a22';
                for(let i=0; i<128; i+=8) {
                    cctx.beginPath(); cctx.moveTo(i,0); cctx.lineTo(i,128); cctx.stroke();
                    cctx.beginPath(); cctx.moveTo(0,i); cctx.lineTo(128,i); cctx.stroke();
                }
                // Glowing nodes
                cctx.fillStyle = '#06c';
                for(let i=0; i<128; i+=32) cctx.fillRect(i-2,i-2,4,4);
            }
            generateTextures();
            const floorTexturePixels = buildPackedTexture(fctx);
            const ceilTexturePixels = buildPackedTexture(cctx);

            function renderSceneBackground(horizon, vertOffset, zoomFactor, fov) {
                const posZ = HALF_H * zoomFactor;
                const leftAngle = player.dir - fov / 2;
                const leftCos = Math.cos(leftAngle);
                const leftSin = Math.sin(leftAngle);
                const strafeCos = Math.cos(player.dir + Math.PI / 2);
                const strafeSin = Math.sin(player.dir + Math.PI / 2);

                for (let y = 0; y < SCREEN_H; y++) {
                    const rowStart = y * SCREEN_W;
                    if (y < horizon) {
                        const skyT = Math.min(1, y / Math.max(1, horizon));
                        scenePixels.fill(
                            packColor(
                                2 + (6 * skyT) | 0,
                                3 + (9 * skyT) | 0,
                                5 + (15 * skyT) | 0
                            ),
                            rowStart,
                            rowStart + SCREEN_W
                        );
                    } else {
                        const floorT = Math.min(1, (y - horizon) / Math.max(1, SCREEN_H - horizon));
                        scenePixels.fill(
                            packColor(
                                4 + (6 * floorT) | 0,
                                10 + (12 * floorT) | 0,
                                14 + (16 * floorT) | 0
                            ),
                            rowStart,
                            rowStart + SCREEN_W
                        );
                    }

                    const p = y - HALF_H - vertOffset;
                    if (p === 0) continue;

                    const isFloor = y > horizon;
                    const isCeil = y < horizon;
                    if (!isFloor && !isCeil) continue;

                    const rowDist = posZ / Math.abs(p);
                    if (rowDist > 14) continue;

                    const stepX = rowDist * fov / SCREEN_W * strafeCos;
                    const stepY = rowDist * fov / SCREEN_W * strafeSin;
                    let worldX = player.x + rowDist * leftCos;
                    let worldY = player.y + rowDist * leftSin;
                    let bright = Math.min(1, 3 / rowDist);
                    bright = isCeil ? bright * 0.45 + 0.2 : bright * 0.75 + 0.15;
                    const texture = isFloor ? floorTexturePixels : ceilTexturePixels;

                    for (let x = 0; x < SCREEN_W; x += 2) {
                        const texX = ((worldX * TEX_SIZE) | 0) & (TEX_SIZE - 1);
                        const texY = ((worldY * TEX_SIZE) | 0) & (TEX_SIZE - 1);
                        const shaded = shadePackedColor(texture[texY * TEX_SIZE + texX], bright);
                        scenePixels[rowStart + x] = shaded;
                        if (x + 1 < SCREEN_W) scenePixels[rowStart + x + 1] = shaded;
                        worldX += stepX * 2;
                        worldY += stepY * 2;
                    }
                }

                ctx.putImageData(sceneImage, 0, 0);
            }

            // ---- Procedural map generation ----
            function applyNewMap() {
                const W = 16, H = 16;
                
                // Fill with walls
                for (let y = 0; y < H; y++)
                    for (let x = 0; x < W; x++) map[y][x] = 1;

                // Drunkard's Walk to ensure 100% connectivity
                let cx = 1, cy = 1;
                map[cy][cx] = 0;
                let floorCount = 1;
                const targetFloor = 110;
                
                while (floorCount < targetFloor) {
                    let dir = [[1,0],[-1,0],[0,1],[0,-1]][Math.floor(Math.random()*4)];
                    let nx = cx + dir[0], ny = cy + dir[1];
                    
                    if (nx > 0 && nx < W-1 && ny > 0 && ny < H-1) {
                        if (map[ny][nx] === 1) {
                            map[ny][nx] = 0;
                            floorCount++;
                        }
                        cx = nx; cy = ny;
                    }
                }

                const component = new Set();
                for (let y=0; y<H; y++)
                    for (let x=0; x<W; x++)
                        if (map[y][x] === 0) component.add(`${x},${y}`);

                // Pick 3 medkit positions: open cells at least 5 units from player start
                const candidates = [...component]
                    .map(k => k.split(',').map(Number))
                    .filter(([x,y]) => (x+0.5-1.5)**2+(y+0.5-1.5)**2 > 25)
                    .sort(() => Math.random()-0.5);
                
                const chosen = [];
                for (const [x,y] of candidates) {
                    if (chosen.every(([cx,cy]) => (cx-x)**2+(cy-y)**2 >= 16)) {
                        chosen.push([x,y]);
                        if (chosen.length === 3) break;
                    }
                }
                if (chosen.length < 3) chosen.push(...candidates.slice(chosen.length, 3));
                medkits.length = 0;
                chosen.forEach(([x,y]) => medkits.push({x:x+0.5, y:y+0.5, active:true}));

                // Place neon light sources
                const LIGHT_PALETTE = [
                    [0,210,255], [200,0,255], [255,100,0], [0,255,140], [255,0,120],
                ];
                const lightCands = [...component]
                    .map(k => k.split(',').map(Number))
                    .filter(([x,y]) => (x+0.5-1.5)**2+(y+0.5-1.5)**2 > 9)
                    .sort(() => Math.random()-0.5);
                lights.length = 0;
                const numLights = 3 + (Math.random() < 0.5 ? 1 : 0);
                for (const [x,y] of lightCands) {
                    if (lights.length >= numLights) break;
                    if (lights.every(l => (l.x-(x+0.5))**2+(l.y-(y+0.5))**2 >= 20)) {
                        const [lr,lg,lb] = LIGHT_PALETTE[Math.floor(Math.random()*LIGHT_PALETTE.length)];
                        lights.push({
                            x:x+0.5, y:y+0.5, r:lr, g:lg, b:lb,
                            radius: 6.0, 
                            flickerPhase: Math.random()*Math.PI*2,
                            faulty: Math.random() < 0.3,
                            dir: Math.random() < 0.5 ? 'H' : 'V' // World-space orientation
                        });
                    }
                }

                // Rebuild spawn point list
                spawnPoints.length = 0;
                for (let y=0;y<H;y++)
                    for (let x=0;x<W;x++)
                        if (map[y][x]===0) spawnPoints.push({x:x+0.5, y:y+0.5});

                // Place 3–5 item pickups (weapons + defensive items), spread from medkits + each other
                const pickupCands = [...component]
                    .map(k => k.split(',').map(Number))
                    .filter(([x,y]) => (x+0.5-1.5)**2+(y+0.5-1.5)**2 > 4)
                    .sort(() => Math.random()-0.5);
                pickups.length = 0;
                const numPickups = 3 + (Math.random() < 0.6 ? 1 : 2);
                const pTypes = ['machinegun','sniper','armour','shield','hip'];
                const pWeights = [3, 2, 3, 2, 2]; // machinegun/armour more common
                for (const [x,y] of pickupCands) {
                    if (pickups.length >= numPickups) break;
                    let px = x+0.5, py = y+0.5;
                    if (pickups.every(p => (p.x-px)**2+(p.y-py)**2 >= 9) &&
                        medkits.every(m => (m.x-px)**2+(m.y-py)**2 >= 4)) {
                        let totalWeight = pWeights.reduce((a,b)=>a+b, 0);
                        let r = Math.random()*totalWeight, ci = 0, cw = 0;
                        while (ci < pTypes.length-1 && cw + pWeights[ci] <= r) { cw += pWeights[ci]; ci++; }
                        pickups.push({x:px, y:py, type:pTypes[ci], active:true, bobPhase:Math.random()*Math.PI*2});
                    }
                }
            }

            // tier 0=Grunt  1=Veteran  2=Elite
            const TIER_COLORS = [
                { leg:'#0e1622', legGap:'#080c10', boot:'#141e2c', belt:'#111',
                  arm:'#1a2840', chest:'#121c30', chestHL:'#1e2e4e',
                  trim:'rgba(0,210,200,0.7)', neck:'#8a7060',
                  helm:'#1a1a1a', helmEdge:'#111', visor:'#0a0000', eye:'rgba(255,30,0,0.95)' },
                { leg:'#1a0a08', legGap:'#100604', boot:'#25100a', belt:'#180600',
                  arm:'#33120e', chest:'#280e0c', chestHL:'#3c1616',
                  trim:'rgba(255,110,0,0.85)', neck:'#8a7060',
                  helm:'#1a0a08', helmEdge:'#100404', visor:'#100400', eye:'rgba(255,140,0,0.95)' },
                { leg:'#0e0e0a', legGap:'#080808', boot:'#141410', belt:'#0a0a08',
                  arm:'#161614', chest:'#111110', chestHL:'#1c1c18',
                  trim:'rgba(220,190,0,0.9)', neck:'#806860',
                  helm:'#0c0c0a', helmEdge:'#060606', visor:'#080600', eye:'rgba(220,200,0,0.95)' },
            ];
            const ENEMY_TIERS = [
                { maxHp: 3,  speed: 0.006, coolMin: 90, coolMax: 150, minHit: 0.10, hitFalloff: 0.12 },
                { maxHp: 6,  speed: 0.007, coolMin: 65, coolMax: 110, minHit: 0.30, hitFalloff: 0.07 },
                { maxHp: 10, speed: 0.009, coolMin: 46, coolMax: 85,  minHit: 0.50, hitFalloff: 0.04 },
            ];
            function pickTier() {
                let r = Math.random();
                if (kills < 3)  return 0;
                if (kills < 8)  return r < 0.85 ? 0 : 1;
                if (kills < 15) return r < 0.55 ? 0 : r < 0.90 ? 1 : 2;
                if (kills < 25) return r < 0.25 ? 0 : r < 0.72 ? 1 : 2;
                if (kills < 40) return r < 0.08 ? 0 : r < 0.48 ? 1 : 2;
                return r < 0.55 ? 2 : 1;  // mostly elites at high kills
            }
            function makeEnemy(x, y, tier = 0) {
                const td = ENEMY_TIERS[tier];
                return { x, y, hp: td.maxHp, maxHp: td.maxHp, tier,
                         shootTimer: 180, dead: false, flash: 0,
                         spotted: false, reactionTimer: 0, losGapTimer: 0, muzzleFlashLife: 0,
                         path: [], pathTimer: 0, lastKnownX: x, lastKnownY: y };
            }

            const enemies = [
                makeEnemy(5.5, 5.5),
                makeEnemy(7.5, 2.5),
                makeEnemy(2.5, 7.5),
            ];

            function spawnEnemy() {
                const alive = enemies.filter(e => !e.dead).length;
                if (alive >= 10) return;
                const valid = spawnPoints.filter(p => {
                    let dx = p.x - player.x, dy = p.y - player.y;
                    return Math.sqrt(dx*dx + dy*dy) > 4;
                });
                if (!valid.length) return;
                const p = valid[Math.floor(Math.random() * valid.length)];
                enemies.push(makeEnemy(p.x, p.y, pickTier()));
            }

            // ---- Audio ----
            let paused = false;
            const pauseBtn = document.getElementById('pause-btn');
            function togglePause() {
                if (gameState !== 'playing') return;
                paused = !paused;
                pauseBtn.textContent = paused ? '▶ RESUME' : '⏸ PAUSE';
                pauseBtn.classList.toggle('paused', paused);
                if (paused) document.exitPointerLock();
                else canvas.requestPointerLock();
            }
            pauseBtn.addEventListener('click', togglePause);

            let soundEnabled = localStorage.getItem('neonBreachSFX') !== 'off';
            const soundBtn = document.getElementById('sound-toggle');
            function updateSoundBtn() {
                soundBtn.textContent = soundEnabled ? '♪ SFX ON' : '♪ SFX OFF';
                soundBtn.classList.toggle('muted', !soundEnabled);
            }
            updateSoundBtn();
            soundBtn.addEventListener('click', () => {
                soundEnabled = !soundEnabled;
                localStorage.setItem('neonBreachSFX', soundEnabled ? 'on' : 'off');
                updateSoundBtn();
            });

            let audioCtx = null;
            function getAudio() {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function playGunshot() {
                if (!soundEnabled) return;
                const ac = getAudio();
                const now = ac.currentTime;

                // Crack — short white noise burst
                const crackLen = ac.sampleRate * 0.08;
                const crackBuf = ac.createBuffer(1, crackLen, ac.sampleRate);
                const crackData = crackBuf.getChannelData(0);
                for (let i = 0; i < crackLen; i++) crackData[i] = Math.random() * 2 - 1;
                const crack = ac.createBufferSource();
                crack.buffer = crackBuf;
                const crackFilter = ac.createBiquadFilter();
                crackFilter.type = 'bandpass';
                crackFilter.frequency.value = 1200;
                crackFilter.Q.value = 0.8;
                const crackGain = ac.createGain();
                crackGain.gain.setValueAtTime(1.1, now);
                crackGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                crack.connect(crackFilter);
                crackFilter.connect(crackGain);
                crackGain.connect(ac.destination);
                crack.start(now);

                // Boom — oscillator dropping fast
                const boom = ac.createOscillator();
                boom.type = 'sine';
                boom.frequency.setValueAtTime(180, now);
                boom.frequency.exponentialRampToValueAtTime(35, now + 0.15);
                const boomGain = ac.createGain();
                boomGain.gain.setValueAtTime(0.5, now);
                boomGain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                boom.connect(boomGain);
                boomGain.connect(ac.destination);
                boom.start(now);
                boom.stop(now + 0.2);
            }

            function playEnemyShot() {
                if (!soundEnabled) return;
                const ac = getAudio();
                const now = ac.currentTime;
                // Distant high-passed crack — much quieter than player shot
                const len = ac.sampleRate * 0.055;
                const buf = ac.createBuffer(1, len, ac.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
                const src = ac.createBufferSource();
                src.buffer = buf;
                const filt = ac.createBiquadFilter();
                filt.type = 'highpass';
                filt.frequency.value = 1800;
                const gain = ac.createGain();
                gain.gain.setValueAtTime(0.28, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.055);
                src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
                src.start(now);
                // Small low thump
                const osc = ac.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(110, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                const og = ac.createGain();
                og.gain.setValueAtTime(0.12, now);
                og.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                osc.connect(og); og.connect(ac.destination);
                osc.start(now); osc.stop(now + 0.15);
            }

            function playHeartbeat(volume) {
                if (!soundEnabled) return;
                const ac = getAudio();
                const now = ac.currentTime;
                const osc = ac.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(65, now);
                osc.frequency.exponentialRampToValueAtTime(28, now + 0.14);
                const gain = ac.createGain();
                gain.gain.setValueAtTime(volume, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                osc.connect(gain); gain.connect(ac.destination);
                osc.start(now); osc.stop(now + 0.2);
            }

            function playHeadshot() {
                if (!soundEnabled) return;
                const ac = getAudio();
                const now = ac.currentTime;
                // Sharp high-pitched ping + brief metallic crack
                const ping = ac.createOscillator();
                ping.type = 'sine';
                ping.frequency.setValueAtTime(1800, now);
                ping.frequency.exponentialRampToValueAtTime(900, now + 0.12);
                const pingGain = ac.createGain();
                pingGain.gain.setValueAtTime(0.28, now);
                pingGain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                ping.connect(pingGain); pingGain.connect(ac.destination);
                ping.start(now); ping.stop(now + 0.2);
                // Short noise tick for the "crack"
                const tickLen = ac.sampleRate * 0.025;
                const tickBuf = ac.createBuffer(1, tickLen, ac.sampleRate);
                const td = tickBuf.getChannelData(0);
                for (let i = 0; i < tickLen; i++) td[i] = Math.random() * 2 - 1;
                const tick = ac.createBufferSource();
                tick.buffer = tickBuf;
                const tickFilt = ac.createBiquadFilter();
                tickFilt.type = 'highpass';
                tickFilt.frequency.value = 3000;
                const tickGain = ac.createGain();
                tickGain.gain.setValueAtTime(0.18, now);
                tickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.025);
                tick.connect(tickFilt); tickFilt.connect(tickGain); tickGain.connect(ac.destination);
                tick.start(now);
            }

            function playMedkit() {
                if (!soundEnabled) return;
                const ac = getAudio();
                const now = ac.currentTime;
                [0, 0.1, 0.2].forEach((delay, i) => {
                    const o = ac.createOscillator();
                    o.type = 'sine';
                    o.frequency.value = [440, 554, 659][i];
                    const g = ac.createGain();
                    g.gain.setValueAtTime(0.25, now + delay);
                    g.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.25);
                    o.connect(g); g.connect(ac.destination);
                    o.start(now + delay); o.stop(now + delay + 0.3);
                });
            }
            function playPickup() {
                if (!soundEnabled) return;
                const ac = getAudio(); const now = ac.currentTime;
                [0, 0.07, 0.14].forEach((delay, i) => {
                    const o = ac.createOscillator(), g = ac.createGain();
                    o.type = 'sine'; o.frequency.value = 660 + i * 220;
                    g.gain.setValueAtTime(0.18, now + delay);
                    g.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.15);
                    o.connect(g); g.connect(ac.destination);
                    o.start(now + delay); o.stop(now + delay + 0.15);
                });
            }
            // ---- End Audio ----

            // BFS pathfinding on the 16x16 grid — returns array of {x,y} cell-centre waypoints
            function findPath(fromX, fromY, toX, toY) {
                const sx = Math.floor(fromX), sy = Math.floor(fromY);
                const ex = Math.floor(toX),   ey = Math.floor(toY);
                if (sx === ex && sy === ey) return [];
                pathVisited.fill(0);
                pathPrev.fill(-1);
                let head = 0, tail = 0;
                pathQueueX[tail] = sx;
                pathQueueY[tail] = sy;
                tail++;
                pathVisited[sy * MAP_W + sx] = 1;

                while (head < tail) {
                    const cx = pathQueueX[head];
                    const cy = pathQueueY[head];
                    head++;
                    if (cx === ex && cy === ey) {
                        const path = [];
                        let idx = cy * MAP_W + cx;
                        while (idx !== sy * MAP_W + sx) {
                            const px = idx % MAP_W;
                            const py = (idx / MAP_W) | 0;
                            path.unshift({ x: px + 0.5, y: py + 0.5 });
                            idx = pathPrev[idx];
                        }
                        return path;
                    }
                    const left = cx - 1;
                    if (left >= 0) {
                        const idx = cy * MAP_W + left;
                        if (!pathVisited[idx] && map[cy][left] === 0) {
                            pathVisited[idx] = 1;
                            pathPrev[idx] = cy * MAP_W + cx;
                            pathQueueX[tail] = left;
                            pathQueueY[tail] = cy;
                            tail++;
                        }
                    }
                    const right = cx + 1;
                    if (right < MAP_W) {
                        const idx = cy * MAP_W + right;
                        if (!pathVisited[idx] && map[cy][right] === 0) {
                            pathVisited[idx] = 1;
                            pathPrev[idx] = cy * MAP_W + cx;
                            pathQueueX[tail] = right;
                            pathQueueY[tail] = cy;
                            tail++;
                        }
                    }
                    const up = cy - 1;
                    if (up >= 0) {
                        const idx = up * MAP_W + cx;
                        if (!pathVisited[idx] && map[up][cx] === 0) {
                            pathVisited[idx] = 1;
                            pathPrev[idx] = cy * MAP_W + cx;
                            pathQueueX[tail] = cx;
                            pathQueueY[tail] = up;
                            tail++;
                        }
                    }
                    const down = cy + 1;
                    if (down < MAP_H) {
                        const idx = down * MAP_W + cx;
                        if (!pathVisited[idx] && map[down][cx] === 0) {
                            pathVisited[idx] = 1;
                            pathPrev[idx] = cy * MAP_W + cx;
                            pathQueueX[tail] = cx;
                            pathQueueY[tail] = down;
                            tail++;
                        }
                    }
                }
                return [];
            }

            function hasLOS(ax, ay, bx, by) {
                const dx = bx - ax;
                const dy = by - ay;
                let cx = Math.floor(ax);
                let cy = Math.floor(ay);
                const endX = Math.floor(bx);
                const endY = Math.floor(by);
                if (cx === endX && cy === endY) return true;

                const stepX = dx > 0 ? 1 : dx < 0 ? -1 : 0;
                const stepY = dy > 0 ? 1 : dy < 0 ? -1 : 0;
                const invDx = dx === 0 ? Infinity : Math.abs(1 / dx);
                const invDy = dy === 0 ? Infinity : Math.abs(1 / dy);
                let tMaxX = stepX > 0 ? (Math.floor(ax) + 1 - ax) * invDx : stepX < 0 ? (ax - Math.floor(ax)) * invDx : Infinity;
                let tMaxY = stepY > 0 ? (Math.floor(ay) + 1 - ay) * invDy : stepY < 0 ? (ay - Math.floor(ay)) * invDy : Infinity;

                while (cx !== endX || cy !== endY) {
                    if (tMaxX < tMaxY) {
                        cx += stepX;
                        tMaxX += invDx;
                    } else {
                        cy += stepY;
                        tMaxY += invDy;
                    }
                    if (cx < 0 || cx >= MAP_W || cy < 0 || cy >= MAP_H || map[cy][cx] === 1) return false;
                }
                return true;
            }

            const player = {
                x: 1.5, y: 1.5,
                dir: 0,
                pitch: 0,
                isShooting: false,
                isAiming: false,
                aimFov: Math.PI / 3,   // smoothly interpolated FOV
                shotTargetX: 800, shotTargetY: 400,
                z: 0, velZ: 0, onGround: true,
                vx: 0, vy: 0,
                weapon: 'pistol',    // 'pistol' | 'machinegun' | 'sniper'
                ammo: 0,
                armourShots: 0,      // damage-reduction shots remaining
                shieldShots: 0,      // full-block shots remaining
                hipShots: 0,         // 100% accuracy hip-fire shots remaining
                autoFire: false,
                autoFireTimer: 0,
            };
            const keys = {};
            applyNewMap(); // generate the first map on page load

            function respawn() {
                applyNewMap();
                player.x = 1.5; player.y = 1.5; player.dir = 0; player.pitch = 0;
                player.z = 0; player.velZ = 0; player.onGround = true; player.vx = 0; player.vy = 0;
                player.weapon = 'pistol'; player.ammo = 0; player.armourShots = 0; player.shieldShots = 0; player.hipShots = 0; player.autoFire = false; player.autoFireTimer = 0;
                playerHp = 100;
                isDead = false; hitFlash = 0; heartbeatTimer = 60; heartbeatLub = true;
                kills = 0;
                enemies.length = 0;
                impacts.length = 0;
                medkitRespawnTimer = 1800;
                spawnTimer = 60;
                paused = false;
                pauseBtn.textContent = '⏸ PAUSE';
                pauseBtn.classList.remove('paused');
                pauseBtn.style.display = 'block';

            }

            function goToMenu() {
                isDead = false;
                paused = false;
                pauseBtn.style.display = 'none';

                document.exitPointerLock();
            }

            window.addEventListener("keydown", (e) => {
                keys[e.code] = true;
                if (e.code === 'KeyR' && gameState === 'dead') respawn();
                if (e.code === 'Enter' && gameState === 'menu') respawn();
                if (e.code === 'KeyM') soundBtn.click();
                if (e.code === 'KeyP' || e.code === 'Escape') togglePause();
            });
            window.addEventListener("keyup", (e) => (keys[e.code] = false));

            canvas.addEventListener("click", (e) => {
                if (gameState === 'menu') { respawn(); return; }
                if (gameState === 'dead') {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = 1600 / rect.width, scaleY = 800 / rect.height;
                    const cx = (e.clientX - rect.left) * scaleX;
                    const cy = (e.clientY - rect.top) * scaleY;
                    if (cx > 490 && cx < 750 && cy > 535 && cy < 600) { respawn(); return; }
                    if (cx > 850 && cx < 1110 && cy > 535 && cy < 600) { goToMenu(); return; }
                    return;
                }
                if (document.pointerLockElement !== canvas) {
                    canvas.requestPointerLock();
                }
            });
            function doShoot() {
                const weapon = player.weapon;
                let wallDist = 0, ex = Math.cos(player.dir), ey = Math.sin(player.dir);
                while (wallDist < 15) {
                    wallDist += 0.05;
                    let tx = Math.floor(player.x + ex * wallDist), ty = Math.floor(player.y + ey * wallDist);
                    if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H || map[ty][tx] === 1) break;
                }
                // Per-weapon spread
                let hipMult = 28, hipMax = 440, aimMult = 2.2, aimMax = 34;
                if (weapon === 'machinegun') { hipMult = 50; hipMax = 700; aimMult = 0.9; aimMax = 20; }
                if (weapon === 'sniper')     { hipMult = 12; hipMax = 180; aimMult = 0.08; aimMax = 1; }
                let spread = player.isAiming
                    ? Math.min(aimMax, wallDist * aimMult)
                    : Math.min(hipMax, wallDist * hipMult);

                if (player.hipShots > 0 && !player.isAiming) {
                    spread = 0;
                }

                player.shotTargetX = 800 + (Math.random() - 0.5) * spread;
                player.shotTargetY = 400 + (Math.random() - 0.5) * spread;

                if (player.hipShots > 0 && !player.isAiming) {
                   player.hipShots--;
                }
                muzzleLife = weapon === 'machinegun' ? 0.5 : 1.0;
                playGunshot();

                // Per-weapon damage
                let bodyDmg = weapon === 'machinegun' ? 0.5 : weapon === 'sniper' ? 2 : 1;
                let headDmg = weapon === 'machinegun' ? 1   : weapon === 'sniper' ? 99: 3;

                // Hit detection (same screen-space logic as before)
                let hitEnemy = false, nearest = null, nearestDist = Infinity, nearestHS = false;
                const fovAtShot = player.aimFov;
                const zoomAtShot = Math.tan(Math.PI / 6) / Math.tan(fovAtShot / 2);
                const vertOffsetAtShot = player.pitch * zoomAtShot + player.z * 2;
                enemies.forEach(e => {
                    if (e.dead) return;
                    let dx = e.x - player.x, dy = e.y - player.y;
                    let d = Math.sqrt(dx*dx + dy*dy);
                    let eAngle = Math.atan2(dy, dx) - player.dir;
                    while (eAngle >  Math.PI) eAngle -= 2 * Math.PI;
                    while (eAngle < -Math.PI) eAngle += 2 * Math.PI;
                    if (Math.abs(eAngle) > fovAtShot / 2 + 0.3) return;
                    let eScrX = (0.5 + eAngle / fovAtShot) * 1600;
                    let eSprH = 640 / d * zoomAtShot;
                    let eSprTop = 400 - eSprH / 2 + vertOffsetAtShot;
                    let halfW = eSprH * 0.55 / 2 + 8;
                    if (Math.abs(player.shotTargetX - eScrX) < halfW && d < nearestDist && hasLOS(player.x, player.y, e.x, e.y)) {
                        nearest = e; nearestDist = d;
                        nearestHS = player.shotTargetY >= eSprTop + eSprH * 0.06 &&
                                    player.shotTargetY <= eSprTop + eSprH * 0.30;
                    }
                });
                if (nearest) {
                    let dmg = nearestHS ? headDmg : bodyDmg;
                    nearest.hp -= dmg;
                    nearest.flash = 8;
                    hitEnemy = true;
                    if (nearestHS) playHeadshot();
                    if (nearest.hp <= 0) { nearest.dead = true; kills++; }
                }
                impacts.push({
                    x: player.shotTargetX, y: player.shotTargetY,
                    life: 1.0, isBlood: hitEnemy, isHeadshot: nearestHS,
                    sparks: Array.from({ length: 8 }, () => ({
                        angle: Math.random() * Math.PI * 2,
                        speed: 1.5 + Math.random() * 3,
                        len: 4 + Math.random() * 8,
                    })),
                });
                // Consume ammo for special weapons; revert to pistol when empty
                if (weapon !== 'pistol') {
                    player.ammo--;
                    if (player.ammo <= 0) { player.weapon = 'pistol'; player.ammo = 0; }
                }
            }

            document.addEventListener("mousedown", (e) => {
                if (document.pointerLockElement !== canvas) return;
                if (isDead || paused) return;
                if (e.button === 2) { player.isAiming = true; e.preventDefault(); }
                if (e.button === 0) {
                    if (player.weapon === 'machinegun') {
                        player.autoFire = true;
                        if (player.autoFireTimer <= 0) { doShoot(); player.autoFireTimer = 5; }
                    } else if (!player.isShooting) {
                        player.isShooting = true;
                        doShoot();
                        setTimeout(() => (player.isShooting = false), 200);
                    }
                }
            });
            document.addEventListener("mouseup", (e) => {
                if (e.button === 2) player.isAiming = false;
                if (e.button === 0) player.autoFire = false;
            });
            canvas.addEventListener("contextmenu", (e) => e.preventDefault());
            document.addEventListener("mousemove", (e) => {
                if (document.pointerLockElement === canvas && !isDead) {
                    player.dir += e.movementX * 0.002;
                    player.pitch = Math.max(-300, Math.min(300, player.pitch - e.movementY * 0.5));
                } else {
                    const rect = canvas.getBoundingClientRect();
                    mouseX = (e.clientX - rect.left) * (1600 / rect.width);
                    mouseY = (e.clientY - rect.top) * (800 / rect.height);
                }
            });

            function update() {
                if (gameState === 'menu') { menuFrame++; return; }
                if (paused || isDead) return;

                // Smoothly zoom FOV in/out
                let scopedFov = player.weapon === 'sniper'
                    ? Math.PI / 32
                    : player.weapon === 'pistol'
                    ? Math.PI / 3.6
                    : player.weapon === 'machinegun'
                    ? Math.PI / 3.9
                    : Math.PI / 8;
                let targetFov = player.isAiming ? scopedFov : Math.PI / 3;
                player.aimFov += (targetFov - player.aimFov) * 0.12;

                // Machine gun auto-fire
                if (player.autoFire && player.weapon === 'machinegun') {
                    player.autoFireTimer--;
                    if (player.autoFireTimer <= 0) { doShoot(); player.autoFireTimer = 5; }
                } else {
                    player.autoFireTimer = 0;
                }

                const speed = keys["ShiftLeft"] || keys["ShiftRight"] ? 0.04 : 0.02;

                // Mobile look input
                if (isMobile) {
                    player.dir += mob.lookX * 0.05;
                    player.pitch = Math.max(-300, Math.min(300, player.pitch - mob.lookY * 18));
                    if (mob.firing && !player.autoFire) {
                        player.autoFire = true;
                        if (player.autoFireTimer <= 0) { doShoot(); player.autoFireTimer = 5; }
                    } else if (!mob.firing) { player.autoFire = false; }
                    player.isAiming = mob.aiming;
                }

                let tx = 0, ty = 0;
                if (keys["KeyW"] || mob.moveY < -0.2) { const f = mob.moveY < -0.2 ? Math.min(1, -mob.moveY) : 1; tx += Math.cos(player.dir) * speed * f; ty += Math.sin(player.dir) * speed * f; }
                if (keys["KeyS"] || mob.moveY >  0.2) { const f = mob.moveY >  0.2 ? Math.min(1,  mob.moveY) : 1; tx -= Math.cos(player.dir) * speed * f; ty -= Math.sin(player.dir) * speed * f; }
                if (keys["KeyA"] || mob.moveX < -0.2) { const f = mob.moveX < -0.2 ? Math.min(1, -mob.moveX) : 1; tx += Math.cos(player.dir - Math.PI/2) * speed * f; ty += Math.sin(player.dir - Math.PI/2) * speed * f; }
                if (keys["KeyD"] || mob.moveX >  0.2) { const f = mob.moveX >  0.2 ? Math.min(1,  mob.moveX) : 1; tx += Math.cos(player.dir + Math.PI/2) * speed * f; ty += Math.sin(player.dir + Math.PI/2) * speed * f; }

                // Smooth velocity
                player.vx = player.vx * 0.15 + tx * 0.85;
                player.vy = player.vy * 0.15 + ty * 0.85;

                // Radius-based collision
                let newX = player.x + player.vx;
                let newY = player.y + player.vy;
                
                if (map[Math.floor(player.y)][Math.floor(newX + (player.vx > 0 ? playerRadius : -playerRadius))] === 0) {
                    player.x = newX;
                }
                if (map[Math.floor(newY + (player.vy > 0 ? playerRadius : -playerRadius))][Math.floor(player.x)] === 0) {
                    player.y = newY;
                }

                if (keys["Space"] && player.onGround) { player.velZ = 3.5; player.onGround = false; }
                player.velZ -= 0.2;
                player.z += player.velZ;
                if (player.z <= 0) { player.z = 0; player.velZ = 0; player.onGround = true; }

                // Spawn enemies on a timer (faster as kills increase)
                spawnTimer--;
                if (spawnTimer <= 0) {
                    spawnEnemy();
                    spawnTimer = Math.max(90, 300 - kills * 10);
                }

                // Medkit respawn — one at a time, gets rarer as kills climb
                medkitRespawnTimer--;
                if (medkitRespawnTimer <= 0) {
                    const inactive = medkits.filter(m => !m.active);
                    if (inactive.length > 0) {
                        inactive[Math.floor(Math.random() * inactive.length)].active = true;
                    }
                    // 30s base, up to ~2min at high kills
                    medkitRespawnTimer = Math.min(7200, 1800 + kills * 90);
                }

                // Decay animations
                if (muzzleLife > 0) muzzleLife = Math.max(0, muzzleLife - 0.15);
                for (let i = impacts.length - 1; i >= 0; i--) {
                    impacts[i].life -= 0.07;
                    if (impacts[i].life <= 0) impacts.splice(i, 1);
                }

                // Enemy AI
                if (hitFlash > 0) hitFlash--;
                enemies.forEach(enemy => {
                    if (enemy.dead) return;
                    if (enemy.flash > 0) enemy.flash--;
                    if (enemy.muzzleFlashLife > 0) enemy.muzzleFlashLife = Math.max(0, enemy.muzzleFlashLife - 0.15);
                    let dx = player.x - enemy.x, dy = player.y - enemy.y;
                    let d = Math.sqrt(dx*dx + dy*dy);
                    const canSee = hasLOS(enemy.x, enemy.y, player.x, player.y);

                    if (canSee) {
                        enemy.losGapTimer = 0;
                        if (!enemy.spotted) {
                            // First time spotting — set reaction delay (3–5 seconds at 60fps)
                            enemy.spotted = true;
                            // Reaction time shrinks as kills climb: 3–5s early, ~0.5s at kill 40+
                            let reactionBase = Math.max(30, 180 - kills * 3.5);
                            let reactionRange = Math.max(15, 120 - kills * 2);
                            enemy.reactionTimer = (reactionBase + Math.random() * reactionRange) | 0;
                            enemy.shootTimer = enemy.reactionTimer + 90; // don't fire during reaction
                        }
                        // Count down reaction time before enemy is ready to shoot
                        if (enemy.reactionTimer > 0) enemy.reactionTimer--;

                        // Has LOS: record last known position, move directly (path is clear)
                        const COMBAT_RANGE = 3.5;
                        const td = ENEMY_TIERS[enemy.tier];
                        enemy.lastKnownX = player.x;
                        enemy.lastKnownY = player.y;
                        enemy.path = [];
                        if (d > COMBAT_RANGE) {
                            let nx = enemy.x + (dx/d) * td.speed, ny = enemy.y + (dy/d) * td.speed;
                            if (map[Math.floor(ny)][Math.floor(enemy.x)] === 0) enemy.y = ny;
                            if (map[Math.floor(enemy.y)][Math.floor(nx)] === 0) enemy.x = nx;
                        }

                        // Only shoot after reaction time has elapsed
                        if (enemy.reactionTimer <= 0) {
                            enemy.shootTimer--;
                            if (enemy.shootTimer <= 0) {
                                enemy.muzzleFlashLife = 1.0;
                                playEnemyShot();
                                let hitChance = Math.max(td.minHit, 1.0 - d * td.hitFalloff);
                                if (Math.random() < hitChance) {
                                    let dmg = Math.max(1, 12 - d * 1.2) | 0;
                                    if (player.shieldShots > 0) { player.shieldShots--; dmg = 0; hitFlash = 6; }
                                    else if (player.armourShots > 0) { player.armourShots--; dmg = Math.max(1, Math.floor(dmg * 0.3)); }
                                    if (dmg > 0) { playerHp = Math.max(0, playerHp - dmg); hitFlash = 12; }
                                }
                                enemy.shootTimer = td.coolMin + (Math.random() * (td.coolMax - td.coolMin)) | 0;
                            }
                        }
                    } else {
                        // Lost line of sight — navigate to last known position via BFS
                        enemy.losGapTimer++;
                        if (enemy.spotted) {
                            const td2 = ENEMY_TIERS[enemy.tier];
                            // Recalculate path periodically or when exhausted
                            if (enemy.pathTimer <= 0 || enemy.path.length === 0) {
                                enemy.path = findPath(enemy.x, enemy.y, enemy.lastKnownX, enemy.lastKnownY);
                                enemy.pathTimer = 40;
                            }
                            enemy.pathTimer--;
                            if (enemy.path.length > 0) {
                                const wp = enemy.path[0];
                                const wdx = wp.x - enemy.x, wdy = wp.y - enemy.y;
                                const wd = Math.sqrt(wdx*wdx + wdy*wdy);
                                if (wd < 0.18) {
                                    enemy.path.shift(); // reached waypoint, advance
                                } else {
                                    let nx = enemy.x + (wdx/wd) * td2.speed;
                                    let ny = enemy.y + (wdy/wd) * td2.speed;
                                    if (map[Math.floor(ny)][Math.floor(enemy.x)] === 0) enemy.y = ny;
                                    if (map[Math.floor(enemy.y)][Math.floor(nx)] === 0) enemy.x = nx;
                                }
                            }
                        }
                        // Give up after ~5 seconds out of sight
                        if (enemy.losGapTimer > 300) {
                            enemy.spotted = false;
                            enemy.reactionTimer = 0;
                            enemy.losGapTimer = 0;
                            enemy.path = [];
                        }
                    }
                });

                gameFrame++;

                // Heartbeat — speeds up as HP drops
                if (!isDead) {
                    heartbeatTimer--;
                    if (heartbeatTimer <= 0) {
                        if (heartbeatLub) {
                            playHeartbeat(0.7);
                            heartbeatTimer = 10; // gap between lub and dub
                        } else {
                            playHeartbeat(0.4);
                            // Interval: fast at low HP, slow at full HP
                            heartbeatTimer = Math.floor(30 + playerHp * 1.3);
                        }
                        heartbeatLub = !heartbeatLub;
                    }
                }

                // Medkit pickup
                medkits.forEach(m => {
                    if (!m.active) return;
                    if (Math.hypot(player.x - m.x, player.y - m.y) < 0.6) {
                        m.active = false;
                        playerHp = 100;
                        playMedkit();
                    }
                });

                // Item pickup collision
                pickups.forEach(p => {
                    if (!p.active) return;
                    if (Math.hypot(player.x - p.x, player.y - p.y) < 0.6) {
                        p.active = false;
                        if (p.type === 'machinegun') {
                            player.ammo = player.weapon === 'machinegun' ? Math.min(160, player.ammo + 80) : 80;
                            player.weapon = 'machinegun';
                        } else if (p.type === 'sniper') {
                            player.ammo = player.weapon === 'sniper' ? Math.min(24, player.ammo + 12) : 12;
                            player.weapon = 'sniper';
                        } else if (p.type === 'armour') {
                            player.armourShots = Math.min(50, player.armourShots + 25);
                        } else if (p.type === 'shield') {
                            player.shieldShots = Math.min(16, player.shieldShots + 8);
                        } else if (p.type === 'hip') {
                            player.hipShots = Math.min(24, player.hipShots + 12);
                        }
                        playPickup();
                    }
                });

                // Death
                if (playerHp <= 0 && !isDead) {
                    isDead = true;
                    paused = false;
                    pauseBtn.style.display = 'none';
                    gameState = 'dead';
                    document.exitPointerLock();
                    if (kills > highScore) {
                        highScore = kills;
                        localStorage.setItem('neonBreachHS', highScore);
                    }
                }
            }

            function drawKey(x, y, txt) {
                ctx.save();
                ctx.font = 'bold 13px "Courier New"';
                const tw = ctx.measureText(txt).width;
                const kw = Math.max(24, tw + 12), kh = 24;
                
                ctx.fillStyle = '#051015';
                ctx.fillRect(x, y - 16, kw, kh);

                ctx.strokeRect(x, y - 16, kw, kh);

                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(x, y, s, s);
                ctx.strokeStyle = 'rgba(255,160,0,0.5)';
                ctx.strokeRect(x, y, s, s);

                if (type === 'NANO-MEDS') {
                    ctx.fillStyle = '#f00';

                    ctx.fillRect(x + 8, y + 18, 24, 8);
                    ctx.fillRect(x + 24, y + 12, 6, 4);

                    ctx.fillRect(x + 12, y + 14, 8, 6);

                    ctx.fillStyle = '#68f';

                    ctx.moveTo(x+20, y+8); ctx.lineTo(x+32, y+16); ctx.lineTo(x+28, y+32); 
                    ctx.lineTo(x+12, y+32); ctx.lineTo(x+8, y+16); ctx.closePath(); ctx.fill();

                    const g = ctx.createRadialGradient(cx, cy, 2, cx, cy, 15);
                    g.addColorStop(0, '#fff'); g.addColorStop(0.5, '#c5f'); g.addColorStop(1, 'transparent');
                    ctx.fillStyle = g;
                    ctx.beginPath(); ctx.arc(cx, cy, 15, 0, Math.PI*2); ctx.fill();

                    ctx.strokeStyle = '#0f6'; ctx.lineWidth = 2;

                    ctx.beginPath(); ctx.moveTo(cx-15, cy); ctx.lineTo(cx+15, cy); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx, cy-15); ctx.lineTo(cx, cy+15); ctx.stroke();

                ctx.fillRect(x, y, 10, 2); ctx.fillRect(x, y, 2, 10);
                ctx.fillRect(x+w-10, y, 10, 2); ctx.fillRect(x+w-2, y, 2, 10);
                ctx.fillRect(x, y+h-2, 10, 2); ctx.fillRect(x, y+h-10, 2, 10);
                ctx.fillRect(x+w-10, y+h-2, 10, 2); ctx.fillRect(x+w-2, y+h-10, 2, 10);
