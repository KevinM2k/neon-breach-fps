            function drawWeapon(aimProgress) {
                if (isDead) return;
                const wx = 800, wy = 800;
                const bobX = Math.sin(gameFrame * 0.1) * 15 * (1 - aimProgress);
                const bobY = Math.abs(Math.cos(gameFrame * 0.1)) * 10 * (1 - aimProgress);
                const recoil = muzzleLife * 15;

                ctx.save();
                ctx.translate(wx + bobX, wy + bobY + recoil);
                if (aimProgress > 0.5) ctx.translate(0, aimProgress * 80); // Lower weapon when aiming

                if (player.weapon === 'pistol') {
                    // Pistol Body
                    ctx.fillStyle = '#111';
                    ctx.fillRect(-35, -160, 70, 160); // Grip
                    ctx.fillStyle = '#222';
                    ctx.fillRect(-35, -180, 70, 50); // Slide
                    // Detail lines
                    ctx.strokeStyle = '#333';
                    ctx.beginPath(); ctx.moveTo(-35, -130); ctx.lineTo(35, -130); ctx.stroke();
                    // Glowing barrel
                    ctx.fillStyle = '#0ff';
                    ctx.beginPath(); ctx.arc(0, -165, 8, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowBlur = 10; ctx.shadowColor = '#0ff';
                    ctx.strokeStyle = '#0ff';
                    ctx.strokeRect(-35, -180, 70, 180);
                    ctx.shadowBlur = 0;
                } else if (player.weapon === 'machinegun') {
                    // MG Body
                    ctx.fillStyle = '#051010';
                    ctx.fillRect(-50, -200, 100, 200);
                    // Quad barrels
                    ctx.fillStyle = '#000';
                    for(let i=0; i<4; i++) {
                        let bx = (i%2?10:-25), by = (i<2?-260:-240);
                        ctx.fillRect(bx, by, 15, 60);
                    }
                    // Heat sink / vents
                    ctx.fillStyle = '#0cc';
                    for(let i=0; i<6; i++) ctx.fillRect(-45, -190 + i*12, 90, 4);
                    // Side rails
                    ctx.fillStyle = '#082828';
                    ctx.fillRect(-55, -180, 5, 150);
                    ctx.fillRect(50, -180, 5, 150);
                    // Glow
                    ctx.shadowBlur = 20; ctx.shadowColor = '#0ff';
                    ctx.strokeStyle = '#0ff';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(-50, -200, 100, 200);
                    ctx.shadowBlur = 0;
                } else if (player.weapon === 'sniper') {
                    // Sniper Body
                    ctx.fillStyle = '#1a0d00';
                    ctx.fillRect(-25, -220, 50, 220);
                    // Long Carbon Fiber Barrel
                    ctx.fillStyle = '#080808';
                    ctx.fillRect(-8, -480, 16, 260);
                    // Muzzle brake
                    ctx.fillStyle = '#111';
                    ctx.fillRect(-12, -490, 24, 20);
                    // Gold trim / electronics
                    ctx.fillStyle = '#b8860b';
                    ctx.fillRect(-27, -210, 54, 8);
                    for(let i=0; i<3; i++) {
                        ctx.fillStyle = `rgba(218,165,32,${0.5 + 0.5*Math.sin(gameFrame*0.1 + i)})`;
                        ctx.fillRect(-15 + i*12, -180, 6, 6);
                    }
                    // Glowing rail
                    ctx.shadowBlur = 15; ctx.shadowColor = '#daa520';
                    ctx.strokeStyle = '#daa520';
                    ctx.strokeRect(-25, -220, 50, 220);
                    ctx.shadowBlur = 0;
                }
                ctx.restore();
            }

            function draw() {
                if (gameState === 'menu') { drawMenu(); return; }
                const numRays = NUM_RAYS;
                const fov = player.aimFov;
                const sliceW = SLICE_W;
                const zoomFactor = Math.tan(Math.PI / 6) / Math.tan(fov / 2);
                const vertOffset = player.pitch * zoomFactor + player.z * 2;
                const horizon = HALF_H + vertOffset;
                renderSceneBackground(horizon, vertOffset, zoomFactor, fov);

                // Ceiling strip-light reflections at depth intervals
                ctx.strokeStyle = "rgba(0,210,230,0.055)";
                ctx.lineWidth = 2;
                for (let d = 1; d <= 10; d++) {
                    let cy = horizon - HALF_H * zoomFactor / d;
                    if (cy < 0) continue;
                    ctx.beginPath(); ctx.moveTo(0, Math.floor(cy)); ctx.lineTo(SCREEN_W, Math.floor(cy)); ctx.stroke();
                }

                // Vertical perspective lines for floor
                ctx.strokeStyle = "rgba(0,185,165,0.06)";
                for (let vx = -10; vx <= 20; vx++) {
                    ctx.beginPath();
                    ctx.moveTo(HALF_W + (vx - player.x % 1 - 5) * 2000, SCREEN_H);
                    ctx.lineTo(HALF_W, horizon);
                    ctx.stroke();
                }

                // Neon light effects
                lights.forEach(lt => {
                    let ldx = lt.x - player.x, ldy = lt.y - player.y;
                    let dist = Math.sqrt(ldx*ldx + ldy*ldy);
                    if (dist < 0.1 || dist > 14) return;
                    
                    let angle = Math.atan2(ldy, ldx) - player.dir;
                    while (angle > Math.PI) angle -= 2*Math.PI;
                    while (angle < -Math.PI) angle += 2*Math.PI;
                    if (Math.abs(angle) > fov/2 + 0.5) return;
                    if (!hasLOS(player.x, player.y, lt.x, lt.y)) return;

                    let perpD = Math.max(0.3, Math.cos(angle) * dist);
                    let screenX = (0.5 + angle/fov) * 1600;
                    let flicker = 0.85 + 0.15 * Math.abs(Math.sin(gameFrame * 0.08 + lt.flickerPhase));
                    if (lt.faulty && Math.random() < 0.05) flicker *= 0.2;
                    
                    // Ceiling and Floor positions
                    let cy = horizon - 400 * zoomFactor / perpD;
                    let fy = horizon + 400 * zoomFactor / perpD;
                    
                    let tubeW = Math.max(20, 240 / perpD * zoomFactor);
                    let tubeH = Math.max(2, 12 / perpD * zoomFactor);
                    
                    // Tube world orientation adjustment
                    let isHoriz = lt.dir === 'H';
                    // How much the tube width should be "squashed" based on viewing angle
                    let viewAngle = Math.atan2(ldy, ldx);
                    let orientationFactor = isHoriz ? Math.abs(Math.sin(viewAngle - player.dir)) : Math.abs(Math.cos(viewAngle - player.dir));
                    let displayTubeW = tubeW * (0.3 + 0.7 * orientationFactor);

                    // 1. Ceiling Glow Pool (Large, smooth fade)
                    ctx.save();
                    ctx.globalCompositeOperation = 'lighter';
                    let cRadX = displayTubeW * 6.0, cRadY = cRadX * 0.45;
                    let cg = ctx.createRadialGradient(screenX, cy, 0, screenX, cy, cRadX);
                    cg.addColorStop(0, `rgba(${lt.r},${lt.g},${lt.b},${0.5 * flicker})`);
                    cg.addColorStop(0.2, `rgba(${lt.r},${lt.g},${lt.b},${0.2 * flicker})`);
                    cg.addColorStop(0.5, `rgba(${lt.r},${lt.g},${lt.b},${0.08 * flicker})`);
                    cg.addColorStop(1, `rgba(${lt.r},${lt.g},${lt.b},0)`);
                    ctx.fillStyle = cg;
                    ctx.beginPath(); ctx.ellipse(screenX, cy, cRadX, cRadY, 0, 0, Math.PI*2); ctx.fill();
                    ctx.restore();

                    // 2. Floor Glow Pool (Larger, smooth fade)
                    if (fy <= 800) {
                        ctx.save();
                        ctx.globalCompositeOperation = 'lighter';
                        let fRadX = displayTubeW * 5.0, fRadY = fRadX * 0.35;
                        let fg = ctx.createRadialGradient(screenX, fy, 0, screenX, fy, fRadX);
                        fg.addColorStop(0, `rgba(${lt.r},${lt.g},${lt.b},${0.4 * flicker})`);
                        fg.addColorStop(0.3, `rgba(${lt.r},${lt.g},${lt.b},${0.12 * flicker})`);
                        fg.addColorStop(0.6, `rgba(${lt.r},${lt.g},${lt.b},${0.05 * flicker})`);
                        fg.addColorStop(1, `rgba(${lt.r},${lt.g},${lt.b},0)`);
                        ctx.fillStyle = fg;
                        ctx.beginPath(); ctx.ellipse(screenX, fy, fRadX, fRadY, 0, 0, Math.PI*2); ctx.fill();
                        ctx.restore();
                    }

                    // 3. Horizontal Cathode Tube (Ceiling Fixture)
                    ctx.save();
                    ctx.shadowBlur = 20; ctx.shadowColor = `rgb(${lt.r},${lt.g},${lt.b})`;
                    ctx.fillStyle = `rgba(${lt.r},${lt.g},${lt.b},${0.85 * flicker})`;
                    ctx.fillRect(screenX - displayTubeW/2, cy - tubeH/2, displayTubeW, tubeH);
                    ctx.fillStyle = `rgba(255,255,255,${0.95 * flicker})`;
                    ctx.fillRect(screenX - displayTubeW/2 + 2, cy - tubeH/4, displayTubeW - 4, tubeH/2);
                    ctx.restore();
                });
                // DDA Raycasting
                for (let i = 0; i < numRays; i++) {
                    let rayAngle = player.dir - fov / 2 + i * (fov / numRays);
                    let rdx = Math.cos(rayAngle), rdy = Math.sin(rayAngle);
                    let mx = Math.floor(player.x), my = Math.floor(player.y);
                    let ddx = rdx === 0 ? 1e30 : Math.abs(1/rdx);
                    let ddy = rdy === 0 ? 1e30 : Math.abs(1/rdy);
                    let stepX, stepY, sdx, sdy;
                    if (rdx < 0) { stepX = -1; sdx = (player.x - mx) * ddx; }
                    else         { stepX =  1; sdx = (mx + 1 - player.x) * ddx; }
                    if (rdy < 0) { stepY = -1; sdy = (player.y - my) * ddy; }
                    else         { stepY =  1; sdy = (my + 1 - player.y) * ddy; }
                    let side = 0;
                    for (let s = 0; s < 45; s++) {
                        if (sdx < sdy) { sdx += ddx; mx += stepX; side = 0; }
                        else           { sdy += ddy; my += stepY; side = 1; }
                        if (mx < 0 || mx >= 16 || my < 0 || my >= 16 || map[my][mx] === 1) break;
                    }
                    let perpDist = side === 0 ? sdx - ddx : sdy - ddy;
                    zBuffer[i] = perpDist;

                    let wallH = Math.floor(800 / perpDist * zoomFactor);
                    let wallTop = Math.floor(400 - wallH / 2 + vertOffset);

                    // Brightness: full within ~3 units, fades with distance; side faces 30% darker
                    let bright = Math.max(0.15, Math.min(1, 3.2 / perpDist));
                    let sideDim = side === 1 ? 0.68 : 1.0;

                    // Subtle per-tile variation so adjacent walls have slight shade differences
                    let tileVar = 1.0 + ((mx * 7 + my * 13) & 7) * 0.018;

                    let b = bright * sideDim * tileVar;
                    let r  = Math.floor(72 * b);
                    let g  = Math.floor(78 * b);
                    let bl = Math.floor(82 * b);

                    // Wall texture mapping
                    let hitX = side === 0 ? player.y + perpDist * rdy : player.x + perpDist * rdx;
                    hitX -= Math.floor(hitX);
                    let texX = Math.floor(hitX * 128);
                    if ((side === 0 && rdx > 0) || (side === 1 && rdy < 0)) texX = 127 - texX;

                    let x = Math.floor(i * sliceW);
                    let colW = Math.ceil(sliceW);

                    // Draw base wall color
                    ctx.fillStyle = `rgb(${r},${g},${bl})`;
                    ctx.fillRect(x, wallTop, colW, wallH);

                    // Draw texture slice
                    ctx.globalAlpha = 0.4 * bright;
                    ctx.drawImage(wallCanvas, texX, 0, 1, 128, x, wallTop, colW, wallH);
                    ctx.globalAlpha = 1.0;

                    // Neon light tint — soft glow only on faces oriented toward the light
                    for (const lt of lights) {
                        let ldx = (mx+0.5) - lt.x, ldy = (my+0.5) - lt.y;
                        let facing = side === 0 ? (stepX * ldx > 0) : (stepY * ldy > 0);
                        if (!facing) continue;
                        let ld2 = ldx*ldx + ldy*ldy, rr2 = lt.radius*lt.radius;
                        if (ld2 >= rr2) continue;
                        let ld = Math.sqrt(ld2);
                        if (!hasLOS(lt.x, lt.y, (mx+0.5)-(ldx/ld)*0.6, (my+0.5)-(ldy/ld)*0.6)) continue;
                        let f = 1 - ld2/rr2; f = f*f;
                        let flicker = 0.82 + 0.18*Math.abs(Math.sin(gameFrame*0.045+lt.flickerPhase));
                        if (lt.faulty && Math.random() < 0.04) flicker *= 0.1;
                        let strength = f * flicker * 65;
                        ctx.fillStyle = `rgba(${lt.r},${lt.g},${lt.b},${strength/255})`;
                        ctx.fillRect(x, wallTop, colW, wallH);
                    }
                }

                // Medkit sprites
                medkits.forEach(m => {
                    if (!m.active) return;
                    let dx = m.x - player.x, dy = m.y - player.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let angle = Math.atan2(dy, dx) - player.dir;
                    while (angle > Math.PI)  angle -= 2 * Math.PI;
                    while (angle < -Math.PI) angle += 2 * Math.PI;
                    if (Math.abs(angle) > fov / 2 + 0.2) return;
                    let screenX = Math.floor((0.5 + angle / fov) * 1600);
                    let bob = Math.sin(gameFrame * 0.05) * 6;
                    let spriteH = Math.floor(280 / dist * zoomFactor);
                    let spriteW = Math.floor(spriteH * 0.7);
                    let spriteTop = Math.floor(400 - spriteH / 2 + vertOffset + bob);
                    let startX = Math.max(0, screenX - spriteW / 2);
                    let endX   = Math.min(1600, screenX + spriteW / 2);
                    for (let sx = startX; sx < endX; sx++) {
                        if (zBuffer[Math.min(numRays-1, Math.floor(sx / sliceW))] <= dist) continue;
                        let t = (sx - startX) / spriteW;
                        let isVBar = t > 0.38 && t < 0.62;
                        // Box background
                        ctx.fillStyle = '#0a2a0a';
                        ctx.fillRect(sx, spriteTop, 1, spriteH);
                        // Horizontal bar of cross
                        ctx.fillStyle = '#dd1111';
                        ctx.fillRect(sx, spriteTop + spriteH * 0.38, 1, spriteH * 0.24);
                        // Vertical bar (center columns only)
                        if (isVBar) {
                            ctx.fillStyle = '#dd1111';
                            ctx.fillRect(sx, spriteTop + spriteH * 0.15, 1, spriteH * 0.7);
                        }
                        // White highlight edge
                        ctx.fillStyle = 'rgba(255,255,255,0.15)';
                        ctx.fillRect(sx, spriteTop, 1, spriteH * 0.08);
                    }
                });

                // Item pickup sprites
                pickups.forEach(p => {
                    if (!p.active) return;
                    let dx = p.x - player.x, dy = p.y - player.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let angle = Math.atan2(dy, dx) - player.dir;
                    while (angle >  Math.PI) angle -= 2 * Math.PI;
                    while (angle < -Math.PI) angle += 2 * Math.PI;
                    if (Math.abs(angle) > fov / 2 + 0.2) return;
                    let perpDist = Math.max(0.3, Math.cos(angle) * dist);
                    let screenX = Math.floor((0.5 + angle / fov) * 1600);
                    let bob = Math.sin(gameFrame * 0.06 + p.bobPhase) * 5;
                    let spriteH = Math.floor(240 / perpDist * zoomFactor);
                    let spriteW = Math.floor(spriteH * (p.type === 'sniper' ? 0.3 : p.type === 'machinegun' ? 1.3 : 0.8));
                    let spriteTop = Math.floor(400 - spriteH / 2 + vertOffset + bob);
                    let startX = Math.max(0, screenX - spriteW / 2);
                    let endX   = Math.min(1600, screenX + spriteW / 2);
                    let pulse = 0.6 + 0.4 * Math.abs(Math.sin(gameFrame * 0.07 + p.bobPhase));
                    for (let sx = startX; sx < endX; sx++) {
                        let rayCol = Math.min(numRays-1, Math.floor(sx / sliceW));
                        if (zBuffer[rayCol] < perpDist - 0.1) continue;
                        let t = (sx - startX) / spriteW;
                        if (p.type === 'machinegun') {
                            // Horizontal gun body (center 35%-65% of height)
                            let bTop = spriteTop + spriteH * 0.38, bH = spriteH * 0.24;
                            ctx.fillStyle = '#003038';
                            ctx.fillRect(sx, bTop, 1, bH);
                            // Barrel (top stripe, 90% width)
                            if (t < 0.9) { ctx.fillStyle = `rgba(0,${180+60*pulse|0},220,0.9)`; ctx.fillRect(sx, bTop, 1, Math.max(1, bH*0.2)); }
                            // Grip (center 30-60%, hangs below)
                            if (t > 0.30 && t < 0.60) { ctx.fillStyle = '#001820'; ctx.fillRect(sx, bTop+bH*0.8, 1, spriteH*0.18); }
                            // Glow edge
                            if (t < 0.015 || t > 0.985) { ctx.fillStyle = `rgba(0,${200+55*pulse|0},240,${pulse})`; ctx.fillRect(sx, bTop, 1, bH); }
                        } else if (p.type === 'sniper') {
                            // Long thin rifle (10% height band near center)
                            let bTop = spriteTop + spriteH * 0.42, bH = Math.max(3, spriteH * 0.12);
                            ctx.fillStyle = '#1a1000';
                            ctx.fillRect(sx, bTop, 1, bH);
                            // Barrel line (gold)
                            ctx.fillStyle = `rgba(${180+60*pulse|0},${130+40*pulse|0},0,0.9)`;
                            ctx.fillRect(sx, bTop, 1, Math.max(1, bH*0.25));
                            // Scope (left 25-45%)
                            if (t > 0.25 && t < 0.45) { ctx.fillStyle = '#0a0a14'; ctx.fillRect(sx, bTop - spriteH*0.07, 1, spriteH*0.07); }
                            // Stock (right 70-100%)
                            if (t > 0.70) { ctx.fillStyle = '#3a2000'; ctx.fillRect(sx, bTop, 1, bH*1.5); }
                            // Glow edge
                            if (t < 0.02 || t > 0.98) { ctx.fillStyle = `rgba(${210+45*pulse|0},160,0,${pulse})`; ctx.fillRect(sx, bTop, 1, bH); }
                        } else if (p.type === 'armour') {
                            // Diamond / chevron chest-plate shape
                            let cx2 = 0.5, dist2 = Math.abs(t - cx2);
                            let halfH = spriteH * 0.28 * Math.max(0, 1 - dist2 * 2.2);
                            if (halfH > 0) {
                                let cy2 = spriteTop + spriteH * 0.5;
                                ctx.fillStyle = '#0a1a38';
                                ctx.fillRect(sx, cy2 - halfH, 1, halfH * 2);
                                // Blue-silver highlight on edges
                                if (dist2 > 0.38 || Math.abs(t-cx2) < 0.04) {
                                    ctx.fillStyle = `rgba(80,${120+80*pulse|0},255,${0.7*pulse})`;
                                    ctx.fillRect(sx, cy2 - halfH, 1, halfH*2);
                                }
                                // Center stripe
                                if (t > 0.44 && t < 0.56) {
                                    ctx.fillStyle = `rgba(160,200,255,${0.5*pulse})`;
                                    ctx.fillRect(sx, cy2 - halfH*0.3, 1, halfH*0.6);
                                }
                            }
                        } else if (p.type === 'shield') {
                            // Glowing orb
                            let cx2 = 0.5, dFromC = Math.abs(t - cx2);
                            let halfH = spriteH * 0.30 * Math.sqrt(Math.max(0, 1 - dFromC*dFromC*4));
                            if (halfH > 0) {
                                let cy2 = spriteTop + spriteH * 0.5;
                                ctx.fillStyle = '#18002a';
                                ctx.fillRect(sx, cy2 - halfH, 1, halfH * 2);
                                // Inner glow gradient
                                let innerAlpha = (1 - dFromC*2) * 0.85 * pulse;
                                ctx.fillStyle = `rgba(${160+80*pulse|0},30,255,${innerAlpha})`;
                                ctx.fillRect(sx, cy2 - halfH*0.55, 1, halfH * 1.1);
                                // Bright core
                                if (dFromC < 0.1) {
                                    ctx.fillStyle = `rgba(230,180,255,${0.9*pulse})`;
                                    ctx.fillRect(sx, cy2 - halfH*0.2, 1, halfH*0.4);
                                }
                            }
                        }
                    }
                });

                // Enemy sprites — sorted near-to-far so closer enemies occlude further ones
                const sortedEnemies = enemies.filter(e => !e.dead).sort((a, b) => {
                    // Sort by perpendicular distance (same metric as zBuffer) near-first
                    let angleA = Math.atan2(a.y - player.y, a.x - player.x) - player.dir;
                    let angleB = Math.atan2(b.y - player.y, b.x - player.x) - player.dir;
                    let da = Math.cos(angleA) * Math.hypot(a.x - player.x, a.y - player.y);
                    let db = Math.cos(angleB) * Math.hypot(b.x - player.x, b.y - player.y);
                    return da - db;
                });
                sortedEnemies.forEach(enemy => {
                    let dx = enemy.x - player.x, dy = enemy.y - player.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let angle = Math.atan2(dy, dx) - player.dir;
                    while (angle > Math.PI)  angle -= 2 * Math.PI;
                    while (angle < -Math.PI) angle += 2 * Math.PI;
                    if (Math.abs(angle) > fov / 2 + 0.2) return;
                    // Perpendicular distance matches the wall zBuffer metric — fixes see-through
                    let perpDist = Math.cos(angle) * dist;
                    let screenX = Math.floor((0.5 + angle / fov) * 1600);
                    let spriteH = Math.floor(640 / perpDist * zoomFactor);
                    let spriteW = Math.floor(spriteH * 0.55);
                    let spriteTop = Math.floor(400 - spriteH / 2 + vertOffset);
                    let startX = Math.max(0, screenX - spriteW / 2);
                    let endX   = Math.min(1600, screenX + spriteW / 2);
                    // Tier visual palettes: grunt=navy/cyan, veteran=maroon/orange, elite=black/gold
                    const TC = TIER_COLORS[enemy.tier];

                    let hit = enemy.flash > 0;
                    let visible = false;

                    // Neon Aura Glow
                    ctx.save();
                    ctx.globalCompositeOperation = 'lighter';
                    let auraG = ctx.createRadialGradient(screenX, spriteTop + spriteH*0.5, 0, screenX, spriteTop + spriteH*0.5, spriteH*0.6);
                    auraG.addColorStop(0, TC.trim);
                    auraG.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = auraG;
                    ctx.beginPath();
                    ctx.ellipse(screenX, spriteTop + spriteH*0.5, spriteW*0.8, spriteH*0.6, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();

                    for (let sx = startX; sx < endX; sx++) {
                        let rayCol = Math.min(numRays-1, Math.floor(sx / sliceW));
                        if (zBuffer[rayCol] < perpDist - 0.15) continue;
                        // zBuffer[rayCol] = perpDist; // Don't write to zBuffer yet to allow better sprite layering
                        visible = true;
                        let t = (sx - startX) / spriteW;
                        
                        // Refined hitbox check: only process columns that are part of the enemy visual
                        let isArm = t < 0.12 || t > 0.88;
                        let isShoulder = (t >= 0.05 && t < 0.22) || (t > 0.78 && t <= 0.95);
                        let isCenterBody = t >= 0.22 && t <= 0.78;
                        let isHead = t > 0.35 && t < 0.65;

                        // Only render if it's a valid body part column
                        if (!isArm && !isShoulder && !isCenterBody && !isHead) continue;

                        // --- Legs ---
                        if (t > 0.25 && t < 0.42 || t > 0.58 && t < 0.75) {
                            ctx.fillStyle = hit ? '#ff8866' : TC.leg;
                            ctx.fillRect(sx, spriteTop + spriteH * 0.63, 1, spriteH * 0.37);
                            ctx.fillStyle = hit ? '#ffaa88' : TC.boot;
                            ctx.fillRect(sx, spriteTop + spriteH * 0.92, 1, spriteH * 0.08);
                        }

                        // --- Pauldrons (Shoulders) ---
                        if (isShoulder) {
                            ctx.fillStyle = hit ? '#ff7755' : TC.chest;
                            ctx.fillRect(sx, spriteTop + spriteH * 0.26, 1, spriteH * 0.12);
                            ctx.fillStyle = 'rgba(255,255,255,0.15)'; // Brighter highlights
                            ctx.fillRect(sx, spriteTop + spriteH * 0.26, 1, spriteH * 0.03);
                        }

                        // --- Torso / Chest Armor ---
                        if (isCenterBody) {
                            ctx.fillStyle = hit ? '#ff3311' : TC.chest;
                            ctx.fillRect(sx, spriteTop + spriteH * 0.32, 1, spriteH * 0.28);
                            // Highlight edges for better visibility
                            if (Math.abs(t-0.22)<0.02 || Math.abs(t-0.78)<0.02) {
                                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                                ctx.fillRect(sx, spriteTop + spriteH * 0.32, 1, spriteH * 0.28);
                            }
                            
                            // Power core / Core glow
                            if (t > 0.44 && t < 0.56) {
                                ctx.fillStyle = hit ? '#ffcc44' : TC.trim;
                                ctx.fillRect(sx, spriteTop + spriteH * 0.38, 1, spriteH * 0.08);
                                if (t > 0.48 && t < 0.52) {
                                    ctx.fillStyle = '#fff';
                                    ctx.fillRect(sx, spriteTop + spriteH * 0.40, 1, spriteH * 0.04);
                                }
                            }
                            // Belt
                            ctx.fillStyle = hit ? '#ff4422' : TC.belt;
                            ctx.fillRect(sx, spriteTop + spriteH * 0.58, 1, spriteH * 0.06);
                        }

                        // --- Arms & Weapon ---
                        if (isArm) {
                            ctx.fillStyle = hit ? '#ff5533' : TC.arm;
                            ctx.fillRect(sx, spriteTop + spriteH * 0.35, 1, spriteH * 0.25);
                            if (t > 0.85) { // Gun in right arm
                                ctx.fillStyle = '#222'; // Lighter gun
                                ctx.fillRect(sx, spriteTop + spriteH * 0.45, 1, spriteH * 0.15);
                                ctx.fillStyle = TC.trim;
                                ctx.fillRect(sx, spriteTop + spriteH * 0.48, 1, spriteH * 0.02);
                            }
                        }

                        // --- Helmet & Visor ---
                        if (isHead) {
                            let headT = (t - 0.35) / 0.3;
                            ctx.fillStyle = hit ? '#ff9977' : (headT < 0.1 || headT > 0.9 ? TC.helmEdge : TC.helm);
                            ctx.fillRect(sx, spriteTop + spriteH * 0.10, 1, spriteH * 0.22);
                            // Glowing Visor
                            if (headT > 0.22 && headT < 0.78) {
                                let vTop = spriteTop + spriteH * 0.16, vH = spriteH * 0.06;
                                ctx.fillStyle = hit ? '#fff' : TC.visor;
                                ctx.fillRect(sx, vTop, 1, vH);
                                if (Math.floor(gameFrame/8)%3===0) {
                                    ctx.fillStyle = '#fff';
                                    ctx.fillRect(sx, vTop + vH*0.4, 1, 2);
                                }
                            }
                        }
                    }

                    // Health bar — only if damaged and at least partially visible
                    if (visible && enemy.hp < enemy.maxHp) {
                        let barW = Math.max(30, Math.min(100, spriteW));
                        let barH = Math.max(5, spriteH * 0.035);
                        let barX = screenX - barW / 2;
                        let barY = spriteTop + spriteH * 0.03 - barH - 8;
                        ctx.fillStyle = "#300";
                        ctx.fillRect(barX, barY, barW, barH);
                        let pct = enemy.hp / enemy.maxHp;
                        ctx.fillStyle = pct > 0.5 ? "#4c4" : pct > 0.25 ? "#fc0" : "#f44";
                        ctx.fillRect(barX, barY, barW * pct, barH);
                        ctx.strokeStyle = "#000";
                        ctx.lineWidth = 1;
                        ctx.strokeRect(barX, barY, barW, barH);
                    }

                    // Enemy muzzle flash — shown at gun arm when enemy fires
                    if (visible && enemy.muzzleFlashLife > 0) {
                        let ml = enemy.muzzleFlashLife;
                        let flashX = screenX + spriteW * 0.38;
                        let flashY = spriteTop + spriteH * 0.42;
                        let flashR = Math.max(4, 22 / dist * zoomFactor) * ml;
                        ctx.save();
                        ctx.globalAlpha = ml;
                        let grad = ctx.createRadialGradient(flashX, flashY, 0, flashX, flashY, flashR * 2.5);
                        grad.addColorStop(0, "rgba(255,255,180,0.95)");
                        grad.addColorStop(0.4, "rgba(255,160,20,0.7)");
                        grad.addColorStop(1, "rgba(255,60,0,0)");
                        ctx.fillStyle = grad;
                        ctx.beginPath(); ctx.arc(flashX, flashY, flashR * 2.5, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = `rgba(255,255,220,${ml})`;
                        ctx.beginPath(); ctx.arc(flashX, flashY, flashR * 0.5, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle = `rgba(255,200,50,${ml * 0.9})`;
                        ctx.lineWidth = 1.2;
                        for (let s = 0; s < 6; s++) {
                            let a = (s / 6) * Math.PI * 2;
                            let len = flashR * (1.5 + s * 0.25);
                            ctx.beginPath(); ctx.moveTo(flashX, flashY); ctx.lineTo(flashX + Math.cos(a) * len, flashY + Math.sin(a) * len); ctx.stroke();
                        }
                        ctx.restore();
                    }
                });

                // Neon light orb sprites (wall-mounted fixtures)
                lights.forEach(lt => {
                    let ldx = lt.x - player.x, ldy = lt.y - player.y;
                    let dist = Math.sqrt(ldx*ldx + ldy*ldy);
                    if (dist < 0.1) return;
                    let angle = Math.atan2(ldy, ldx) - player.dir;
                    while (angle >  Math.PI) angle -= 2*Math.PI;
                    while (angle < -Math.PI) angle += 2*Math.PI;
                    if (Math.abs(angle) > fov/2 + 0.2) return;
                    let perpD = Math.max(0.3, Math.cos(angle) * dist);
                    // zBuffer check — orb at head height
                    let rayCol = Math.min(numRays-1, ((0.5 + angle/fov) * numRays)|0);
                    if (zBuffer[rayCol] <= perpD) return;
                    let sx = (0.5 + angle/fov) * 1600;
                    // Position: upper-wall area (looks ceiling-mounted)
                    let wallH = 800 / perpD * zoomFactor;
                    let sy = Math.floor(400 - wallH*0.38 + vertOffset);
                    let flicker = 0.82 + 0.18*Math.abs(Math.sin(gameFrame*0.045+lt.flickerPhase));
                    if (lt.faulty && Math.random() < 0.05) flicker *= 0.1;
                    let core = Math.max(3, 10 / perpD * zoomFactor);
                    let halo = core * 5;
                    // Outer halo
                    ctx.save();
                    let grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, halo);
                    grad.addColorStop(0,   `rgba(${lt.r},${lt.g},${lt.b},${0.55*flicker})`);
                    grad.addColorStop(0.35,`rgba(${lt.r},${lt.g},${lt.b},${0.20*flicker})`);
                    grad.addColorStop(1,   `rgba(${lt.r},${lt.g},${lt.b},0)`);
                    ctx.fillStyle = grad;
                    ctx.beginPath(); ctx.arc(sx, sy, halo, 0, Math.PI*2); ctx.fill();
                    // Bright core
                    ctx.fillStyle = `rgba(255,255,255,${0.92*flicker})`;
                    ctx.beginPath(); ctx.arc(sx, sy, core*0.45, 0, Math.PI*2); ctx.fill();
                    // Coloured mid ring
                    ctx.fillStyle = `rgba(${lt.r},${lt.g},${lt.b},${0.85*flicker})`;
                    ctx.beginPath(); ctx.arc(sx, sy, core, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                });

                // Shield border glow
                if (player.shieldShots > 0) {
                    let pulse = 0.18 + 0.08 * Math.sin(gameFrame * 0.12);
                    ctx.strokeStyle = `rgba(190,40,255,${pulse})`;
                    ctx.lineWidth = 10;
                    ctx.strokeRect(5, 5, 1590, 790);
                }
                if (player.armourShots > 0 && player.shieldShots === 0) {
                    let pulse = 0.12 + 0.05 * Math.sin(gameFrame * 0.09);
                    ctx.strokeStyle = `rgba(50,110,255,${pulse})`;
                    ctx.lineWidth = 7;
                    ctx.strokeRect(5, 5, 1590, 790);
                }
                if (player.hipShots > 0 && !player.isAiming) {
                    let pulse = 0.10 + 0.04 * Math.sin(gameFrame * 0.15);
                    ctx.strokeStyle = `rgba(0,255,100,${pulse})`;
                    ctx.lineWidth = 5;
                    ctx.strokeRect(5, 5, 1590, 790);
                }

                // Weapon / ammo HUD (bottom-right)
                ctx.textAlign = 'right';
                ctx.font = 'bold 20px "Courier New"';
                if (player.weapon === 'pistol') {
                    ctx.fillStyle = 'rgba(140,140,140,0.8)';
                    ctx.fillText('PISTOL  ∞', 1590, 782);
                } else {
                    ctx.fillStyle = player.weapon === 'machinegun' ? 'rgba(0,220,240,0.9)' : 'rgba(220,170,0,0.9)';
                    ctx.fillText(`${player.weapon === 'machinegun' ? 'MACH.GUN' : 'SNIPER'}  ${player.ammo}`, 1590, 782);
                }

                // Armour / shield counters (bottom-left, above HP)
                let defY = 782;
                if (player.shieldShots > 0) {
                    ctx.textAlign = 'left';
                    ctx.fillStyle = 'rgba(210,80,255,0.9)';
                    ctx.fillText(`SHIELD  ${player.shieldShots}`, 12, defY);
                    defY -= 26;
                }
                if (player.armourShots > 0) {
                    ctx.textAlign = 'left';
                    ctx.fillStyle = 'rgba(80,140,255,0.9)';
                    ctx.fillText(`ARMOUR  ${player.armourShots}`, 12, defY);
                    defY -= 26;
                }
                if (player.hipShots > 0) {
                    ctx.textAlign = 'left';
                    ctx.fillStyle = 'rgba(0,255,100,0.9)';
                    ctx.fillText(`HIP ADJ  ${player.hipShots}`, 12, defY);
                }
                ctx.textAlign = 'left';

                // Hit flash
                if (hitFlash > 0) {
                    ctx.fillStyle = `rgba(180,0,0,${hitFlash / 25})`;
                    ctx.fillRect(0, 0, 1600, 800);
                }

                // aimProgress: 0 = hip, 1 = fully scoped
                let aimProgress = 1 - (player.aimFov - Math.PI/8) / (Math.PI/3 - Math.PI/8);
                aimProgress = Math.max(0, Math.min(1, aimProgress));

                drawWeapon(aimProgress);

                // Muzzle flash at bottom-center (gun implied off screen)
                if (muzzleLife > 0 && aimProgress < 0.9) {
                    let ml = muzzleLife;
                    let bx = 800, by = 800;
                    ctx.save();
                    ctx.globalAlpha = ml;
                    let grad = ctx.createRadialGradient(bx, by, 0, bx, by, 40 * ml);
                    grad.addColorStop(0, "rgba(255,255,180,0.95)");
                    grad.addColorStop(0.4, "rgba(255,160,20,0.7)");
                    grad.addColorStop(1, "rgba(255,60,0,0)");
                    ctx.fillStyle = grad;
                    ctx.beginPath(); ctx.arc(bx, by, 40 * ml, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = `rgba(255,255,220,${ml})`;
                    ctx.beginPath(); ctx.arc(bx, by, 10 * ml, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = `rgba(255,200,50,${ml * 0.9})`;
                    ctx.lineWidth = 1.5;
                    for (let s = 0; s < 7; s++) {
                        let a = -Math.PI/2 + (s - 3) * 0.3;
                        let len = (20 + s * 5) * ml;
                        ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + Math.cos(a) * len, by + Math.sin(a) * len); ctx.stroke();
                    }
                    ctx.restore();
                }

                // Scope overlay — fades in
                if (aimProgress > 0.05) {
                    let alpha = Math.min(1, (aimProgress - 0.05) / 0.45);
                    const cx = 800, cy = 400, r = 220;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    // dark surround with circular hole
                    ctx.fillStyle = "rgba(0,0,0,0.93)";
                    ctx.beginPath();
                    ctx.rect(0, 0, 1600, 800);
                    ctx.arc(cx, cy, r, 0, Math.PI*2, true);
                    ctx.fill("evenodd");
                    // lens tint
                    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();
                    ctx.fillStyle = "rgba(0,20,0,0.15)"; ctx.fillRect(0, 0, 1600, 800);
                    ctx.restore();
                    // ring
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.strokeStyle = "#111"; ctx.lineWidth = 14;
                    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
                    ctx.strokeStyle = "#333"; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(cx, cy, r-6, 0, Math.PI*2); ctx.stroke();
                    // reticle
                    ctx.strokeStyle = "rgba(0,0,0,0.85)"; ctx.lineWidth = 1.5;
                    let gap = 24;
                    ctx.beginPath(); ctx.moveTo(cx-r+16,cy); ctx.lineTo(cx-gap,cy); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx+gap,cy); ctx.lineTo(cx+r-16,cy); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx,cy-r+16); ctx.lineTo(cx,cy-gap); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx,cy+gap); ctx.lineTo(cx,cy+r-16); ctx.stroke();
                    ctx.fillStyle = "rgba(0,0,0,0.9)";
                    ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2); ctx.fill();
                    for (let d = 1; d <= 3; d++) {
                        let off = d * 52;
                        [[cx+off,cy],[cx-off,cy],[cx,cy+off],[cx,cy-off]].forEach(([px,py]) => {
                            ctx.fillStyle = "rgba(0,0,0,0.7)";
                            ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI*2); ctx.fill();
                        });
                    }
                    // scope muzzle flash
                    if (muzzleLife > 0) {
                        let ml = muzzleLife;
                        let grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 18 * ml);
                        grad.addColorStop(0, `rgba(255,255,200,${ml})`);
                        grad.addColorStop(1, "rgba(255,100,0,0)");
                        ctx.fillStyle = grad;
                        ctx.beginPath(); ctx.arc(cx, cy, 18 * ml, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.restore();
                }

                // Bullet impact animations (drawn on top of everything)
                impacts.forEach(imp => {
                    let t = 1 - imp.life;   // 0 = just fired, 1 = faded
                    let alpha = imp.life;
                    let ringR = 4 + t * 18;
                    ctx.save();
                    if (imp.isBlood) {
                        // Headshot — gold burst; body hit — red splatter
                        let bc = imp.isHeadshot ? [255,210,0] : [180,0,0];
                        let sc = imp.isHeadshot ? [255,230,80] : [200,0,0];
                        ctx.fillStyle = `rgba(${bc[0]},${bc[1]},${bc[2]},${alpha * 0.9})`;
                        ctx.beginPath(); ctx.arc(imp.x, imp.y, ringR * (imp.isHeadshot ? 0.9 : 0.6), 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle = `rgba(${bc[0]},${bc[1]},${bc[2]},${alpha * 0.7})`;
                        ctx.lineWidth = imp.isHeadshot ? 2.5 : 2;
                        ctx.beginPath(); ctx.arc(imp.x, imp.y, ringR, 0, Math.PI*2); ctx.stroke();
                        imp.sparks.forEach(sp => {
                            let ex = imp.x + Math.cos(sp.angle) * sp.len * (1 + t * 2);
                            let ey = imp.y + Math.sin(sp.angle) * sp.len * (1 + t * 2);
                            ctx.strokeStyle = `rgba(${sc[0]},${sc[1]},${sc[2]},${alpha * 0.6})`;
                            ctx.lineWidth = 1.5;
                            ctx.beginPath(); ctx.moveTo(imp.x, imp.y); ctx.lineTo(ex, ey); ctx.stroke();
                        });
                    } else {
                        // Wall hit — yellow/grey sparks + ring
                        let grad = ctx.createRadialGradient(imp.x, imp.y, 0, imp.x, imp.y, ringR);
                        grad.addColorStop(0, `rgba(255,240,180,${alpha})`);
                        grad.addColorStop(1, "rgba(180,120,0,0)");
                        ctx.fillStyle = grad;
                        ctx.beginPath(); ctx.arc(imp.x, imp.y, ringR, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle = `rgba(255,200,80,${alpha * 0.8})`;
                        ctx.lineWidth = 1.5;
                        ctx.beginPath(); ctx.arc(imp.x, imp.y, ringR * 1.4, 0, Math.PI*2); ctx.stroke();
                        imp.sparks.forEach(sp => {
                            let ex = imp.x + Math.cos(sp.angle) * sp.len * (1 + t * 3);
                            let ey = imp.y + Math.sin(sp.angle) * sp.len * (1 + t * 3);
                            ctx.strokeStyle = `rgba(255,180,30,${alpha * 0.7})`;
                            ctx.lineWidth = 1;
                            ctx.beginPath(); ctx.moveTo(imp.x, imp.y); ctx.lineTo(ex, ey); ctx.stroke();
                        });
                    }
                    ctx.restore();
                });

                // Vignette — darken screen edges
                let vigGrad = ctx.createRadialGradient(800, 400, 180, 800, 400, 960);
                vigGrad.addColorStop(0, "rgba(0,0,0,0)");
                vigGrad.addColorStop(1, "rgba(0,0,12,0.78)");
                ctx.fillStyle = vigGrad;
                ctx.fillRect(0, 0, 1600, 800);

                // Scanlines
                ctx.fillStyle = "rgba(0,0,0,0.07)";
                for (let sl = 0; sl < 800; sl += 2) ctx.fillRect(0, sl, 1600, 1);

                drawHUD();

                // Pause overlay
                if (paused) {
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(0, 0, 1600, 800);
                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#f80';
                    ctx.font = 'bold 90px "Courier New"';
                    ctx.fillText('PAUSED', 800, 370);
                    ctx.fillStyle = '#7a9';
                    ctx.font = '26px "Courier New"';
                    ctx.fillText('Press P or Escape to resume', 800, 440);
                    ctx.textAlign = 'left';
                }

                // Death screen
                if (isDead) {
                    ctx.fillStyle = 'rgba(80,0,0,0.88)';
                    ctx.fillRect(0, 0, 1600, 800);
                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#cc0000';
                    ctx.font = 'bold 130px "Courier New"';
                    ctx.fillText('YOU DIED', 800, 340);
                    ctx.fillStyle = '#aaa';
                    ctx.font = '44px "Courier New"';
                    ctx.fillText(`Kills: ${kills}`, 800, 420);
                    ctx.fillStyle = kills >= highScore ? '#ffdd00' : '#555';
                    ctx.font = '32px "Courier New"';
                    ctx.fillText(`Best: ${highScore}${kills >= highScore && kills > 0 ? '  ★ NEW RECORD' : ''}`, 800, 470);
                    // Respawn button
                    const rHov = mouseX>490 && mouseX<750 && mouseY>535 && mouseY<600;
                    ctx.fillStyle = rHov ? '#005500' : '#002200';
                    ctx.fillRect(490, 535, 260, 60);
                    ctx.strokeStyle = rHov ? '#0f0' : '#080';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(490, 535, 260, 60);
                    ctx.fillStyle = rHov ? '#fff' : '#0f0';
                    ctx.font = 'bold 26px "Courier New"';
                    ctx.fillText('RESPAWN', 620, 573);

                    // Main Menu button
                    const mHov = mouseX>850 && mouseX<1110 && mouseY>535 && mouseY<600;
                    ctx.fillStyle = mHov ? '#000044' : '#000018';
                    ctx.fillRect(850, 535, 260, 60);
                    ctx.strokeStyle = mHov ? '#0cf' : '#046';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(850, 535, 260, 60);
                    ctx.fillStyle = mHov ? '#fff' : '#0cf';
                    ctx.fillText('MAIN MENU', 980, 573);

                    ctx.textAlign = 'left';
                }
            }

            // ── Mobile touch controls ────────────────────────────────────────
            window.addEventListener('touchstart', () => {
                if (isMobile) return;
                isMobile = true;
                document.getElementById('mobile-controls').style.display = 'block';
                document.getElementById('crosshair').style.display = 'none'; // drawn in canvas when aiming
            }, { once: true });

            function setupJoystick(baseEl, knobEl, onMove) {
                const R = 60; // max knob travel radius (half of 120px base)
                let touchId = null, ox = 0, oy = 0;
                baseEl.addEventListener('touchstart', e => {
                    e.preventDefault();
                    if (touchId !== null) return;
                    const t = e.changedTouches[0];
                    touchId = t.identifier;
                    const rect = baseEl.getBoundingClientRect();
                    ox = rect.left + rect.width / 2;
                    oy = rect.top  + rect.height / 2;
                }, { passive: false });
                baseEl.addEventListener('touchmove', e => {
                    e.preventDefault();
                    for (const t of e.changedTouches) {
                        if (t.identifier !== touchId) continue;
                        let dx = t.clientX - ox, dy = t.clientY - oy;
                        const len = Math.sqrt(dx*dx + dy*dy);
                        if (len > R) { dx = dx/len*R; dy = dy/len*R; }
                        knobEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        onMove(dx / R, dy / R);
                    }
                }, { passive: false });
                const end = e => {
                    for (const t of e.changedTouches) {
                        if (t.identifier !== touchId) continue;
                        touchId = null;
                        knobEl.style.transform = 'translate(-50%, -50%)';
                        onMove(0, 0);
                    }
                };
                baseEl.addEventListener('touchend',    end, { passive: false });
                baseEl.addEventListener('touchcancel', end, { passive: false });
            }

            setupJoystick(
                document.getElementById('joy-left'),
                document.getElementById('joy-left-knob'),
                (x, y) => { mob.moveX = x; mob.moveY = y; }
            );
            setupJoystick(
                document.getElementById('joy-right'),
                document.getElementById('joy-right-knob'),
                (x, y) => { mob.lookX = x; mob.lookY = y; }
            );

            function setupMobBtn(id, onDown, onUp) {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); onDown(); }, { passive: false });
                el.addEventListener('touchend',   e => { e.preventDefault(); e.stopPropagation(); onUp();   }, { passive: false });
                el.addEventListener('touchcancel',e => { e.preventDefault(); e.stopPropagation(); onUp();   }, { passive: false });
            }
            setupMobBtn('fire-btn',
                () => { mob.firing = true;  if (gameState === 'menu') respawn(); },
                () => { mob.firing = false; }
            );
            setupMobBtn('aim-btn',
                () => { mob.aiming = true; },
                () => { mob.aiming = false; }
            );

            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }

            loop();
        </script>
    </body>
</html>
